wait when(\"Alice submits a request without a request_type\", async () => {\n      await expect(\n        server.callTool(\"garp_request\", {\n          recipient: \"bob\",\n          context_bundle: { question: \"Missing type test\" },\n          // request_type omitted\n        }),\n      ).rejects.toThrow(/missing required field.*request_type/i);\n    });\n  });\n\n  it(\"rejects request missing required field: context_bundle\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request without a context_bundle\", async () => {\n      await expect(\n        server.callTool(\"garp_request\", {\n          request_type: \"sanity-check\",\n          recipient: \"bob\",\n          // context_bundle omitted\n        }),\n      ).rejects.toThrow(/missing required field.*context_bundle/i);\n    });\n  });\n\n  // =========================================================================\n  // Protocol Extensions: thread_id and attachments (US-002a)\n  // =========================================================================\n\n  it(\"preserves explicit thread_id in envelope and return value when provided\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let requestId: string;\n    let threadId: string;\n\n    await when(\"Alice submits a request with an explicit thread_id\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Follow-up on yesterday's investigation\" },\n        thread_id: \"req-20260220-100000-alice-0001\",\n      })) as { request_id: string; thread_id: string };\n      requestId = result.request_id;\n      threadId = result.thread_id;\n    });\n\n    await thenAssert(\"the envelope contains thread_id matching the provided value\", async () => {\n      const envelope = readRepoJSON<"+"{ thread_id: string; request_id: string }>(\n        ctx.aliceRepo,\n        `requests/pending/${requestId}.json`,\n      );\n      expect(envelope.thread_id).toBe(\"req-20260220-100000-alice-0001\");\n      expect(envelope.request_id).toBe(requestId);\n      // thread_id and request_id are different\n      expect(envelope.thread_id).not.toBe(envelope.request_id);\n    });\n\n    await thenAssert(\"the return value includes the explicit thread_id\", async () => {\n      expect(threadId).toBe(\"req-20260220-100000-alice-0001\");\n    });\n  });\n\n  it(\"submits a request with file attachments written to disk and metadata in envelope\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let requestId: string;\n\n    await when(\"Alice submits a request with two attachments\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Can you check these logs?\" },\n        attachments: [\n          { filename: \"crash.log\", description: \"Application error log\", content: \"Error at line 42\\nNullPointerException\" },\n          { filename: \"config.yml\", description: \"Deployment config\", content: \"env: production\\nreplicas: 3\" },\n        ],\n      })) as { request_id: string };\n      requestId = result.request_id;\n    });\n\n    await thenAssert(\"attachment files exist on disk\", async () => {\n      expect(fileExists(ctx.aliceRepo, `attachments/${requestId}/crash.log`)).toBe(true);\n      expect(fileExists(ctx.aliceRepo, `attachments/${requestId}/config.yml`)).toBe(true);\n    });\n\n    await thenAssert(\"envelope contains attachment metadata without file content\", async () => {\n      const envelope = readRepoJSON<"+"{ attachments?: Array<"+"{ filename: string; description: string; content?: string }> }>(\n        ctx.aliceRepo,\n        `requests/pending/${requestId}.json`,\n      );\n      expect(envelope.attachments).toHaveLength(2);\n      expect(envelope.attachments![0]).toEqual({ filename: \"crash.log\", description: \"Application error log\" });\n      expect(envelope.attachments![1]).toEqual({ filename: \"config.yml\", description: \"Deployment config\" });\n      // Content should NOT be in the envelope\n      expect(envelope.attachments![0].content).toBeUndefined();\n    });\n\n    await thenAssert(\"attachments are pushed to remote alongside the request\", async () => {\n      gitPull(ctx.bobRepo);\n      expect(fileExists(ctx.bobRepo, `attachments/${requestId}/crash.log`)).toBe(true);\n      expect(fileExists(ctx.bobRepo, `attachments/${requestId}/config.yml`)).toBe(true);\n      expect(fileExists(ctx.bobRepo, `requests/pending/${requestId}.json`)).toBe(true);\n    });\n  });\n\n  it(\"auto-assigns thread_id = request_id when thread_id not provided\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let requestId: string;\n    let threadId: string;\n\n    await when(\"Alice submits a request with no thread_id\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Simple question, no extras\" },\n      })) as { request_id: string; thread_id: string };\n      requestId = result.request_id;\n      threadId = result.thread_id;\n    });\n\n    await thenAssert(\"thread_id equals request_id in the envelope\", async () => {\n      const envelope = readRepoJSON<"+"{ thread_id: string; request_id: string }>(\n        ctx.aliceRepo,\n        `requests/pending/${requestId}.json`,\n      );\n      expect(envelope.thread_id).toBe(requestId);\n      expect(envelope.thread_id).toBe(envelope.request_id);\n    });\n\n    await thenAssert(\"return value includes thread_id matching request_id\", async () => {\n      expect(threadId).toBe(requestId);\n    });\n  });\n\n  it(\"omits attachments from envelope when not provided\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let requestId: string;\n\n    await when(\"Alice submits a basic request with no attachments\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Simple question, no extras\" },\n      })) as { request_id: string };\n      requestId = result.request_id;\n    });\n\n    await thenAssert(\"envelope has no attachments key\", async () => {\n      const envelope = readRepoJSON<"+"Record<"+"string, unknown>>(\n        ctx.aliceRepo,\n        `requests/pending/${requestId}.json`,\n      );\n      expect(\"attachments\" in envelope).toBe(false);\n    });\n  });\n\n  // =========================================================================\n  // Error Paths (continued)\n  // =========================================================================\n\n  it(\"retries push after rebase when remote has new commits\", async () => {\n    ctx = createTestRepos();\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await given(\"Bob pushes an unrelated commit while Alice is composing\", async () => {\n      // Simulate: Bob makes a commit directly, Alice's local is now behind\n      execSync(\n        `cd \"${ctx.bobRepo}\" && echo \"note\" > notes.txt && git add notes.txt && git commit -m \"unrelated\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice submits a request (her local is behind)\", async () => {\n      const result = (await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Rebase retry test\" },\n      })) as { request_id: string };\n\n      // Should succeed after pull --rebase + retry\n      expect(result.request_id).toBeTruthy();\n    });\n\n    await thenAssert(\"the request reaches the remote successfully\", async () => {\n      gitPull(ctx.bobRepo);\n      const pending = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(pending).toHaveLength(1);\n    });\n  });\n});\n"},"tests/acceptance/garp-status.test.ts":{"tests":[{"id":"45","name":"garp_status: check request status and response returns completed status with full response for a finished request"},{"id":"46","name":"garp_status: check request status and response returns pending status with no response for a waiting request"},{"id":"47","name":"garp_status: check request status and response includes the original request data in the status response"},{"id":"48","name":"garp_status: check request status and response finds a request regardless of which lifecycle directory it is in"},{"id":"49","name":"garp_status: check request status and response returns thread_id and attachments in the request data when present"},{"id":"50","name":"garp_status: check request status and response returns attachment_paths with absolute paths when request has attachments"},{"id":"51","name":"garp_status: check request status and response omits attachment_paths when request has no attachments"},{"id":"52","name":"garp_status: check request status and response returns cancelled status when request is in cancelled/"},{"id":"53","name":"garp_status: check request status and response returns an error when request ID does not exist in any directory"},{"id":"54","name":"garp_status: check request status and response falls back to local state with warning when git pull fails"},{"id":"55","name":"garp_status: check request status and response status check is read-only -- no commits are created"},{"id":"56","name":"garp_status: check request status and response works from any session -- not tied to the session that created the request"}],"source":"/**\n * Acceptance Tests -- garp_status (Check Request Status)\n *\n * Traces to: US-005, US-012\n *\n * Tests exercise the garp_status driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Returns \"completed\" with full response for finished requests\n *   - Returns \"pending\" with no response for waiting requests\n *   - Searches across all lifecycle directories\n *   - Returns clear error for non-existent request ID\n *   - Falls back to local state when git pull fails\n *   - Is a read-only operation (no commits)\n *   - Returns thread_id and attachments in request data (US-002a/003a)\n *   - Returns resolved attachment_paths when request has attachments (US-012)\n *\n * Error/edge scenarios: 4 of 11 total (36%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  seedPendingRequest,\n  listDir,\n  readRepoJSON,\n  fileExists,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { writeFileSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { execSync } from \"node:child_process\";\n\nimport { createGarpServer } from \"../../src/server.ts\";\n\n/** Seed a completed request + response. */\nfunction seedCompletedRequest(\n  repoPath: string,\n  requestId: string,\n  recipient: string,\n  sender: string,\n  responseBundle: Record<"+"string, unknown>,\n): void {\n  // Write request to completed (not pending)\n  const envelope = {\n    request_id: requestId,\n    request_type: \"sanity-check\",\n    sender: { user_id: sender, display_name: sender.charAt(0).toUpperCase() + sender.slice(1) },\n    recipient: { user_id: recipient, display_name: recipient.charAt(0).toUpperCase() + recipient.slice(1) },\n    status: \"pending\",\n    created_at: \"2026-02-21T14:30:22.000Z\",\n    context_bundle: { question: \"Test question\" },\n  };\n  writeFileSync(\n    join(repoPath, \"requests\", \"completed\", `${requestId}.json`),\n    JSON.stringify(envelope, null, 2),\n  );\n\n  // Write response\n  const response = {\n    request_id: requestId,\n    responder: { user_id: recipient, display_name: recipient.charAt(0).toUpperCase() + recipient.slice(1) },\n    responded_at: \"2026-02-21T16:00:00.000Z\",\n    response_bundle: responseBundle,\n  };\n  writeFileSync(\n    join(repoPath, \"responses\", `${requestId}.json`),\n    JSON.stringify(response, null, 2),\n  );\n\n  execSync(`cd \"${repoPath}\" && git add -A && git commit -m \"seed completed ${requestId}\" && git push`, {\n    stdio: \"pipe\",\n  });\n}\n\n/** Seed a pending request with optional thread_id and attachments. */\nfunction seedPendingRequestWithExtensions(\n  repoPath: string,\n  requestId: string,\n  recipient: string,\n  sender: string,\n  opts?: { threadId?: string; attachments?: Array<"+"{ filename: string; description: string }> },\n): void {\n  const envelope: Record<"+"string, unknown> = {\n    request_id: requestId,\n    request_type: \"sanity-check\",\n    sender: { user_id: sender, display_name: sender.charAt(0).toUpperCase() + sender.slice(1) },\n    recipient: { user_id: recipient, display_name: recipient.charAt(0).toUpperCase() + recipient.slice(1) },\n    status: \"pending\",\n    created_at: \"2026-02-21T14:30:22.000Z\",\n    context_bundle: { question: \"Test question\" },\n  };\n  if (opts?.threadId) {\n    envelope.thread_id = opts.threadId;\n  }\n  if (opts?.attachments?.length) {\n    envelope.attachments = opts.attachments;\n  }\n  writeFileSync(\n    join(repoPath, \"requests\", \"pending\", `${requestId}.json`),\n    JSON.stringify(envelope, null, 2),\n  );\n  execSync(`cd \"${repoPath}\" && git add -A && git commit -m \"seed ${requestId}\" && git push`, {\n    stdio: \"pipe\",\n  });\n}\n\ndescribe(\"garp_status: check request status and response\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"returns completed status with full response for a finished request\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"Alice's request has been responded to by Bob\", async () => {\n      seedCompletedRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\", {\n        answer: \"YES - same pattern as ZD-4102\",\n        evidence: \"Compared refresh.ts with cleanup.ts\",\n        recommendation: \"Apply finally-block cleanup\",\n      });\n    });\n\n    await when(\"Alice checks the status of her request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"completed\");\n      expect(status.response).toBeDefined();\n      expect(status.response.responder.display_name).toBe(\"Bob\");\n      expect(status.response.responded_at).toMatch(/^\\d{4}-\\d{2}-\\d{2}T/);\n      expect(status.response.response_bundle).toMatchObject({\n        answer: \"YES - same pattern as ZD-4102\",\n        recommendation: \"Apply finally-block cleanup\",\n      });\n    });\n  });\n\n  it(\"returns pending status with no response for a waiting request\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"Alice has sent a request that Bob has not yet responded to\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice checks the status of her request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"pending\");\n      expect(status.response).toBeUndefined();\n    });\n  });\n\n  it(\"includes the original request data in the status response\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice checks status\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.request).toMatchObject({\n        request_id: requestId,\n        request_type: \"sanity-check\",\n        sender: { user_id: \"alice\" },\n        recipient: { user_id: \"bob\" },\n      });\n    });\n  });\n\n  it(\"finds a request regardless of which lifecycle directory it is in\", async () => {\n    ctx = createTestRepos();\n    const pendingId = \"req-20260221-140000-alice-0001\";\n    const completedId = \"req-20260221-140100-alice-0002\";\n\n    await given(\"one request is pending and another is completed\", async () => {\n      seedPendingRequest(ctx.aliceRepo, pendingId, \"bob\", \"alice\");\n      seedCompletedRequest(ctx.aliceRepo, completedId, \"bob\", \"alice\", {\n        answer: \"Done\",\n      });\n    });\n\n    await when(\"Alice checks status of each request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      const pendingStatus = await aliceServer.callTool(\"garp_status\", {\n        request_id: pendingId,\n      }) as any;\n      expect(pendingStatus.status).toBe(\"pending\");\n\n      const completedStatus = await aliceServer.callTool(\"garp_status\", {\n        request_id: completedId,\n      }) as any;\n      expect(completedStatus.status).toBe(\"completed\");\n      expect(completedStatus.response.response_bundle.answer).toBe(\"Done\");\n    });\n  });\n\n  // =========================================================================\n  // Protocol Extensions: thread_id and attachments in status (US-002a/003a)\n  // =========================================================================\n\n  it(\"returns thread_id and attachments in the request data when present\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n    const threadId = \"req-20260221-100000-alice-0001\";\n\n    await given(\"a pending request exists with thread_id and attachments\", async () => {\n      seedPendingRequestWithExtensions(ctx.aliceRepo, requestId, \"bob\", \"alice\", {\n        threadId,\n        attachments: [\n          { filename: \"crash.log\", description: \"Application error log\" },\n          { filename: \"config.yml\", description: \"Deployment configuration\" },\n        ],\n      });\n    });\n\n    await when(\"Alice checks the status of her request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"pending\");\n      expect(status.request.thread_id).toBe(threadId);\n      expect(status.request.attachments).toHaveLength(2);\n      expect(status.request.attachments[0]).toEqual({\n        filename: \"crash.log\",\n        description: \"Application error log\",\n      });\n    });\n  });\n\n  // =========================================================================\n  // Attachment Paths in Status (US-012 partial)\n  // =========================================================================\n\n  it(\"returns attachment_paths with absolute paths when request has attachments\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists with attachments\", async () => {\n      seedPendingRequestWithExtensions(ctx.aliceRepo, requestId, \"bob\", \"alice\", {\n        attachments: [\n          { filename: \"crash.log\", description: \"Error log\" },\n          { filename: \"config.yml\", description: \"Deploy config\" },\n        ],\n      });\n    });\n\n    await when(\"Alice checks the status of her request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.attachment_paths).toBeDefined();\n      expect(status.attachment_paths).toHaveLength(2);\n      expect(status.attachment_paths[0]).toEqual({\n        filename: \"crash.log\",\n        description: \"Error log\",\n        path: join(ctx.aliceRepo, \"attachments\", requestId, \"crash.log\"),\n      });\n      expect(status.attachment_paths[1]).toEqual({\n        filename: \"config.yml\",\n        description: \"Deploy config\",\n        path: join(ctx.aliceRepo, \"attachments\", requestId, \"config.yml\"),\n      });\n    });\n  });\n\n  it(\"omits attachment_paths when request has no attachments\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists without attachments\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice checks the status of her request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.attachment_paths).toBeUndefined();\n    });\n  });\n\n  // =========================================================================\n  // Cancelled Status\n  // =========================================================================\n\n  it(\"returns cancelled status when request is in cancelled/\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"Alice's pending request has been cancelled\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      // Move request from pending/ to cancelled/ via git\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/cancelled/${requestId}.json && git commit -m \"cancel ${requestId}\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice checks the status of her cancelled request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"cancelled\");\n      expect(status.request).toMatchObject({\n        request_id: requestId,\n        request_type: \"sanity-check\",\n        sender: { user_id: \"alice\" },\n        recipient: { user_id: \"bob\" },\n      });\n      expect(status.response).toBeUndefined();\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"returns an error when request ID does not exist in any directory\", async () => {\n    ctx = createTestRepos();\n\n    await when(\"Alice checks status of a non-existent request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_status\", {\n          request_id: \"req-nonexistent-0000\",\n        }),\n      ).rejects.toThrow(/not found/i);\n    });\n  });\n\n  it(\"falls back to local state with warning when git pull fails\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a completed request exists locally but remote is unreachable\", async () => {\n      seedCompletedRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\", {\n        answer: \"Cached answer\",\n      });\n\n      // Break the remote\n      execSync(`mv \"${ctx.remotePath}\" \"${ctx.remotePath}.broken\"`, { stdio: \"pipe\" });\n    });\n\n    await when(\"Alice checks status with remote unreachable\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"completed\");\n      expect(status.response.response_bundle.answer).toBe(\"Cached answer\");\n      expect(status.warning).toMatch(/stale|local/i);\n    });\n\n    // Restore for cleanup\n    await thenAssert(\"(cleanup) restore remote\", async () => {\n      execSync(`mv \"${ctx.remotePath}.broken\" \"${ctx.remotePath}\"`, { stdio: \"pipe\" });\n    });\n  });\n\n  it(\"status check is read-only -- no commits are created\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice checks status\", async () => {\n      const commitsBefore = execSync(\n        `cd \"${ctx.aliceRepo}\" && git rev-list --count HEAD`,\n        { encoding: \"utf-8\" },\n      ).trim();\n\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      });\n\n      const commitsAfter = execSync(\n        `cd \"${ctx.aliceRepo}\" && git rev-list --count HEAD`,\n        { encoding: \"utf-8\" },\n      ).trim();\n\n      // Pull may update commit count, but Alice should not have authored new commits\n      // The commit count after should be the same since pull from same remote won't add commits\n      // (alice already has the latest). The key check: no new commits by Alice after the call.\n      const aliceCommitsAfter = execSync(\n        `cd \"${ctx.aliceRepo}\" && git log --author=\"alice\" --oneline | wc -l`,\n        { encoding: \"utf-8\" },\n      ).trim();\n      // Alice authored seed commits but status should not add any new ones\n      // We just verify the count didn't change\n      expect(Number(commitsAfter)).toBe(Number(commitsBefore));\n    });\n  });\n\n  it(\"works from any session -- not tied to the session that created the request\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"Alice sent a request from 'Session A' (simulated by first server instance)\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice checks status from 'Session B' (new server instance)\", async () => {\n      // The key point: a fresh server instance can find the request\n      const aliceSessionB = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const status = await aliceSessionB.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n\n      expect(status.status).toBe(\"pending\");\n      expect(status.request.request_id).toBe(requestId);\n    });\n  });\n});\n"},"tests/acceptance/garp-amend.test.ts":{"tests":[{"id":"57","name":"garp_amend: amend a pending request sender amends a pending request, appending an amendment entry"},{"id":"58","name":"garp_amend: amend a pending request multiple amendments append without overwriting prior amendments"},{"id":"59","name":"garp_amend: amend a pending request rejects amendment when caller is not the sender"},{"id":"60","name":"garp_amend: amend a pending request rejects amendment when request is already completed"},{"id":"61","name":"garp_amend: amend a pending request rejects amendment when request is already cancelled"}],"source":"/**\n * Acceptance Tests -- garp_amend (Amend a Pending Request)\n *\n * Traces to: US-014\n *\n * Tests exercise the garp_amend driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Sender can amend a pending request (amendment appended)\n *   - Multiple amendments append without overwriting\n *   - Non-sender is blocked from amending\n *   - Completed request cannot be amended\n *   - Cancelled request cannot be amended\n *\n * Test Budget: 5 behaviors x 2 = 10 max (using 5)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  seedPendingRequest,\n  readRepoJSON,\n  lastCommitMessage,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { execSync } from \"node:child_process\";\nimport { createGarpServer } from \"../../src/server.ts\";\n\ndescribe(\"garp_amend: amend a pending request\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"sender amends a pending request, appending an amendment entry\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n    let result: any;\n\n    await given(\"a pending request from Alice to Bob exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice amends the request with updated fields\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      result = await aliceServer.callTool(\"garp_amend\", {\n        request_id: requestId,\n        fields: { customer: \"Acme Corp v2\", priority: \"high\" },\n        note: \"Updated customer name\",\n      });\n    });\n\n    await thenAssert(\"result confirms amendment\", async () => {\n      expect(result.status).toBe(\"amended\");\n      expect(result.request_id).toBe(requestId);\n      expect(result.amendment_count).toBe(1);\n    });\n\n    await thenAssert(\"envelope in pending/ has the amendment entry appended\", async () => {\n      const envelope = readRepoJSON<"+"any>(ctx.aliceRepo, `requests/pending/${requestId}.json`);\n      expect(envelope.amendments).toHaveLength(1);\n      expect(envelope.amendments[0]).toMatchObject({\n        amended_by: \"alice\",\n        fields: { customer: \"Acme Corp v2\", priority: \"high\" },\n        note: \"Updated customer name\",\n      });\n      expect(envelope.amendments[0].amended_at).toMatch(/^\\d{4}-\\d{2}-\\d{2}T/);\n    });\n\n    await thenAssert(\"commit message matches expected format\", async () => {\n      const msg = lastCommitMessage(ctx.aliceRepo);\n      expect(msg).toBe(`[garp] amended: ${requestId}`);\n    });\n\n    await thenAssert(\"changes reach the remote (Bob can pull them)\", async () => {\n      gitPull(ctx.bobRepo);\n      const envelope = readRepoJSON<"+"any>(ctx.bobRepo, `requests/pending/${requestId}.json`);\n      expect(envelope.amendments).toHaveLength(1);\n    });\n  });\n\n  // =========================================================================\n  // Multiple Amendments\n  // =========================================================================\n\n  it(\"multiple amendments append without overwriting prior amendments\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice to Bob exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice amends the request twice\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await aliceServer.callTool(\"garp_amend\", {\n        request_id: requestId,\n        fields: { customer: \"Acme Corp v2\" },\n      });\n\n      const result = await aliceServer.callTool(\"garp_amend\", {\n        request_id: requestId,\n        fields: { priority: \"critical\" },\n        note: \"Escalated priority\",\n      });\n\n      expect((result as any).amendment_count).toBe(2);\n    });\n\n    await thenAssert(\"both amendments are present in order\", async () => {\n      const envelope = readRepoJSON<"+"any>(ctx.aliceRepo, `requests/pending/${requestId}.json`);\n      expect(envelope.amendments).toHaveLength(2);\n      expect(envelope.amendments[0].fields).toEqual({ customer: \"Acme Corp v2\" });\n      expect(envelope.amendments[0].note).toBeUndefined();\n      expect(envelope.amendments[1].fields).toEqual({ priority: \"critical\" });\n      expect(envelope.amendments[1].note).toBe(\"Escalated priority\");\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"rejects amendment when caller is not the sender\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice to Bob exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob (the recipient, not sender) tries to amend\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_amend\", {\n          request_id: requestId,\n          fields: { customer: \"Changed by Bob\" },\n        }),\n      ).rejects.toThrow(/only the sender/i);\n    });\n  });\n\n  it(\"rejects amendment when request is already completed\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a completed request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/completed/ && git commit -m \"complete it\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice tries to amend the completed request\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_amend\", {\n          request_id: requestId,\n          fields: { customer: \"Too late\" },\n        }),\n      ).rejects.toThrow(/already completed/i);\n    });\n  });\n\n  it(\"rejects amendment when request is already cancelled\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a cancelled request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/cancelled/ && git commit -m \"cancel it\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice tries to amend the cancelled request\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_amend\", {\n          request_id: requestId,\n          fields: { customer: \"Too late\" },\n        }),\n      ).rejects.toThrow(/already cancelled/i);\n    });\n  });\n});\n"},"tests/acceptance/garp-cancel.test.ts":{"tests":[{"id":"62","name":"garp_cancel: cancel a pending request sender cancels a pending request, moving it to cancelled/ with status cancelled"},{"id":"63","name":"garp_cancel: cancel a pending request persists cancel_reason in the envelope when reason is provided"},{"id":"64","name":"garp_cancel: cancel a pending request rejects cancellation when the caller is not the sender"},{"id":"65","name":"garp_cancel: cancel a pending request rejects cancellation when the request is already completed"},{"id":"66","name":"garp_cancel: cancel a pending request rejects cancellation when the request is already cancelled"}],"source":"/**\n * Acceptance Tests -- garp_cancel (Cancel a Pending Request)\n *\n * Traces to: US-013\n *\n * Tests exercise the garp_cancel driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Sender cancels pending request (moves to cancelled/, status updated)\n *   - Non-sender is blocked from cancelling\n *   - Already completed request returns error\n *   - Already cancelled request returns error\n *   - Cancel reason is persisted in envelope\n *\n * Error/edge scenarios: 3 of 5 total (60%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  seedPendingRequest,\n  listDir,\n  readRepoJSON,\n  lastCommitMessage,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { execSync } from \"node:child_process\";\nimport { createGarpServer } from \"../../src/server.ts\";\n\ndescribe(\"garp_cancel: cancel a pending request\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"sender cancels a pending request, moving it to cancelled/ with status cancelled\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice addressed to Bob exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice cancels the request\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      const result = await aliceServer.callTool(\"garp_cancel\", {\n        request_id: requestId,\n      });\n\n      expect((result as any).status).toBe(\"cancelled\");\n    });\n\n    await thenAssert(\"request moves from pending to cancelled with status field updated\", async () => {\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n\n      const cancelled = listDir(ctx.aliceRepo, \"requests/cancelled\");\n      expect(cancelled).toHaveLength(1);\n      expect(cancelled[0]).toBe(`${requestId}.json`);\n\n      const envelope = readRepoJSON<"+"any>(ctx.aliceRepo, `requests/cancelled/${requestId}.json`);\n      expect(envelope.status).toBe(\"cancelled\");\n    });\n\n    await thenAssert(\"commit message matches [garp] cancelled: {request_id}\", async () => {\n      const msg = lastCommitMessage(ctx.aliceRepo);\n      expect(msg).toBe(`[garp] cancelled: ${requestId}`);\n    });\n\n    await thenAssert(\"changes reach the remote (Bob can pull them)\", async () => {\n      gitPull(ctx.bobRepo);\n      expect(listDir(ctx.bobRepo, \"requests/pending\")).toHaveLength(0);\n      expect(listDir(ctx.bobRepo, \"requests/cancelled\")).toHaveLength(1);\n    });\n  });\n\n  // =========================================================================\n  // Cancel with reason\n  // =========================================================================\n\n  it(\"persists cancel_reason in the envelope when reason is provided\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Alice cancels with a reason\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await aliceServer.callTool(\"garp_cancel\", {\n        request_id: requestId,\n        reason: \"Found the answer myself\",\n      });\n    });\n\n    await thenAssert(\"the cancelled envelope has cancel_reason field\", async () => {\n      const envelope = readRepoJSON<"+"any>(ctx.aliceRepo, `requests/cancelled/${requestId}.json`);\n      expect(envelope.status).toBe(\"cancelled\");\n      expect(envelope.cancel_reason).toBe(\"Found the answer myself\");\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"rejects cancellation when the caller is not the sender\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice addressed to Bob exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob (the recipient, not the sender) tries to cancel\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_cancel\", {\n          request_id: requestId,\n        }),\n      ).rejects.toThrow(/only the sender can cancel/i);\n    });\n\n    await thenAssert(\"request stays in pending\", async () => {\n      const pending = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(pending).toContain(`${requestId}.json`);\n    });\n  });\n\n  it(\"rejects cancellation when the request is already completed\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a request has already been completed\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/completed/ && git commit -m \"already done\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice tries to cancel the completed request\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_cancel\", {\n          request_id: requestId,\n        }),\n      ).rejects.toThrow(/already completed/i);\n    });\n  });\n\n  it(\"rejects cancellation when the request is already cancelled\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a request has already been cancelled\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/cancelled/ && git commit -m \"already cancelled\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice tries to cancel it again\", async () => {\n      gitPull(ctx.aliceRepo);\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_cancel\", {\n          request_id: requestId,\n        }),\n      ).rejects.toThrow(/already cancelled/i);\n    });\n  });\n});\n"},"tests/acceptance/skill-contract.test.ts":{"tests":[{"id":"67","name":"skill contract: skill validation and auto-loading garp_request accepts a request when the skill directory exists"},{"id":"68","name":"skill contract: skill validation and auto-loading garp_inbox includes the skill_path for each pending request"},{"id":"69","name":"skill contract: skill validation and auto-loading newly created skill type is available after git pull"},{"id":"70","name":"skill contract: skill validation and auto-loading updated skill file is synced to all clones via git pull"},{"id":"71","name":"skill contract: skill validation and auto-loading garp_request rejects a request type with no skill directory"},{"id":"72","name":"skill contract: skill validation and auto-loading garp_request rejects when SKILL.md file is missing (directory exists but no file)"},{"id":"73","name":"skill contract: skill validation and auto-loading skill validation happens before envelope is written"}],"source":"/**\n * Acceptance Tests -- Skill Contract Validation\n *\n * Traces to: US-006\n *\n * These tests verify that the MCP server correctly validates skill\n * directory existence and provides skill paths for agent auto-loading.\n * The MCP server does NOT parse or enforce skill file content -- that\n * is agent-level behavior. What the server does:\n *\n *   - garp_request checks that skills/{type}/SKILL.md exists before accepting\n *   - garp_inbox includes skill_path in each returned request\n *   - Skill files are distributed via git pull (no separate mechanism)\n *\n * Note: Testing that agents produce consistent behavior from skill files\n * is out of scope for automated acceptance tests. That is validated\n * via manual round-trip tests (US-008 manual checklist).\n *\n * Error/edge scenarios: 3 of 7 total (43%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  listDir,\n  fileExists,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { mkdirSync, writeFileSync, existsSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { execSync } from \"node:child_process\";\nimport { createGarpServer } from \"../../src/server.js\";\n\ndescribe(\"skill contract: skill validation and auto-loading\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"garp_request accepts a request when the skill directory exists\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"the sanity-check skill file exists in the repo\", () => {\n      expect(fileExists(ctx.aliceRepo, \"skills/sanity-check/SKILL.md\")).toBe(true);\n    });\n\n    await when(\"Alice submits a sanity-check request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const result = await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Skill exists test\" },\n      }) as { request_id: string };\n\n      expect(result.request_id).toBeTruthy();\n    });\n  });\n\n  it(\"garp_inbox includes the skill_path for each pending request\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a sanity-check request exists for Bob\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Skill path test\" },\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = await bobServer.callTool(\"garp_inbox\", {}) as { requests: any[] };\n\n      expect(inbox.requests).toHaveLength(1);\n      // skill_path should point to the local file path\n      expect(inbox.requests[0].skill_path).toContain(\"skills/sanity-check/SKILL.md\");\n    });\n  });\n\n  it(\"newly created skill type is available after git pull\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Alice creates a new skill type 'code-review'\", async () => {\n      const skillDir = join(ctx.aliceRepo, \"skills\", \"code-review\");\n      mkdirSync(skillDir, { recursive: true });\n      writeFileSync(\n        join(skillDir, \"SKILL.md\"),\n        \"# Code Review\\n\\nReview code changes for correctness.\\n\",\n      );\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git add -A && git commit -m \"add code-review skill\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Bob pulls the latest\", async () => {\n      gitPull(ctx.bobRepo);\n    });\n\n    await thenAssert(\"Bob's clone has the new skill file\", () => {\n      expect(fileExists(ctx.bobRepo, \"skills/code-review/SKILL.md\")).toBe(true);\n    });\n\n    // And Alice can now send code-review requests\n    await thenAssert(\"Alice can submit a code-review request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n      const result = await aliceServer.callTool(\"garp_request\", {\n        request_type: \"code-review\",\n        recipient: \"bob\",\n        context_bundle: { diff_url: \"https://github.com/acme/platform/pull/42\" },\n      }) as { request_id: string };\n\n      expect(result.request_id).toBeTruthy();\n    });\n  });\n\n  it(\"updated skill file is synced to all clones via git pull\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Alice updates the sanity-check SKILL.md to add a severity field\", async () => {\n      const skillPath = join(ctx.aliceRepo, \"skills\", \"sanity-check\", \"SKILL.md\");\n      const updatedContent = `# Sanity Check (v2)\n\n## Context Bundle Fields\n| Field | Required |\n|-------|----------|\n| customer | yes |\n| severity | yes |\n| question | yes |\n`;\n      writeFileSync(skillPath, updatedContent);\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git add -A && git commit -m \"update sanity-check skill\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Bob pulls the latest\", async () => {\n      gitPull(ctx.bobRepo);\n    });\n\n    await thenAssert(\"Bob's skill file contains the updated content\", () => {\n      const content = execSync(\n        `cat \"${join(ctx.bobRepo, \"skills\", \"sanity-check\", \"SKILL.md\")}\"`,\n        { encoding: \"utf-8\" },\n      );\n      expect(content).toContain(\"severity\");\n      expect(content).toContain(\"v2\");\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"garp_request rejects a request type with no skill directory\", async () => {\n    ctx = createTestRepos();\n\n    await when(\"Alice tries to submit a 'code-review' request (skill does not exist)\", async () => {\n      expect(fileExists(ctx.aliceRepo, \"skills/code-review/SKILL.md\")).toBe(false);\n\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_request\", {\n          request_type: \"code-review\",\n          recipient: \"bob\",\n          context_bundle: { question: \"No skill test\" },\n        }),\n      ).rejects.toThrow(/no skill found.*code-review/i);\n    });\n\n    await thenAssert(\"no request file is created\", async () => {\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n    });\n  });\n\n  it(\"garp_request rejects when SKILL.md file is missing (directory exists but no file)\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a skill directory exists but has no SKILL.md\", async () => {\n      mkdirSync(join(ctx.aliceRepo, \"skills\", \"empty-skill\"), { recursive: true });\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && touch skills/empty-skill/.gitkeep && git add -A && git commit -m \"empty skill dir\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Alice tries to submit an 'empty-skill' request\", async () => {\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_request\", {\n          request_type: \"empty-skill\",\n          recipient: \"bob\",\n          context_bundle: { question: \"Empty skill test\" },\n        }),\n      ).rejects.toThrow(/no skill found.*empty-skill/i);\n    });\n  });\n\n  it(\"skill validation happens before envelope is written\", async () => {\n    ctx = createTestRepos();\n\n    await when(\"Alice submits a request with invalid skill AND invalid recipient\", async () => {\n      // The skill check should happen early, before any file writes\n      const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n      await expect(\n        aliceServer.callTool(\"garp_request\", {\n          request_type: \"nonexistent-skill\",\n          recipient: \"bob\",\n          context_bundle: { question: \"Order of validation test\" },\n        }),\n      ).rejects.toThrow(/no skill found/i);\n\n      // No file should exist\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n    });\n  });\n});\n"},"tests/acceptance/garp-thread.test.ts":{"tests":[{"id":"74","name":"garp_thread: view thread history retrieves multi-round thread history in chronological order"},{"id":"75","name":"garp_thread: view thread history retrieves single-round completed thread"},{"id":"76","name":"garp_thread: view thread history returns empty result with message when thread not found"},{"id":"77","name":"garp_thread: view thread history thread is viewable from any user's server (not tied to sender)"}],"source":"/**\n * Acceptance Tests -- garp_thread (View Thread History)\n *\n * Traces to: US-009\n *\n * Scenarios:\n *   - Multi-round thread with completed and pending requests\n *   - Single-round completed thread\n *   - Thread not found returns empty with message\n *   - Thread includes cancelled requests\n *   - Git pull runs before scanning (with fallback)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  readRepoJSON,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { createGarpServer } from \"../../src/server.ts\";\n\ndescribe(\"garp_thread: view thread history\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  it(\"retrieves multi-round thread history in chronological order\", async () => {\n    ctx = createTestRepos();\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n    let threadId: string;\n    let round1Id: string;\n    let round2Id: string;\n\n    await given(\"Alice sends round 1 of a design conversation to Bob\", async () => {\n      const r1 = (await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Round 1: Does this pattern look right?\" },\n      })) as { request_id: string; thread_id: string };\n      round1Id = r1.request_id;\n      threadId = r1.thread_id;\n    });\n\n    await given(\"Bob responds to round 1\", async () => {\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: round1Id,\n        response_bundle: { answer: \"Looks good but needs tests\" },\n      });\n    });\n\n    await given(\"Alice sends round 2 using the same thread_id\", async () => {\n      const r2 = (await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Round 2: Added tests, what do you think?\" },\n        thread_id: threadId,\n      })) as { request_id: string; thread_id: string };\n      round2Id = r2.request_id;\n    });\n\n    let result: Record<"+"string, unknown>;\n\n    await when(\"Alice calls garp_thread with the thread_id\", async () => {\n      result = (await aliceServer.callTool(\"garp_thread\", {\n        thread_id: threadId,\n      })) as Record<"+"string, unknown>;\n    });\n\n    await thenAssert(\"the result contains 2 entries in chronological order\", async () => {\n      expect(result.thread_id).toBe(threadId);\n      const entries = result.entries as Array<"+"{ request: Record<"+"string, unknown>; response?: Record<"+"string, unknown> }>;\n      expect(entries).toHaveLength(2);\n      // Round 1 first, round 2 second\n      expect(entries[0].request.request_id).toBe(round1Id);\n      expect(entries[1].request.request_id).toBe(round2Id);\n    });\n\n    await thenAssert(\"entry 1 includes Bob's response, entry 2 has no response\", async () => {\n      const entries = result.entries as Array<"+"{ request: Record<"+"string, unknown>; response?: Record<"+"string, unknown> }>;\n      expect(entries[0].response).toBeDefined();\n      expect((entries[0].response as Record<"+"string, unknown>).response_bundle).toMatchObject({ answer: \"Looks good but needs tests\" });\n      expect(entries[1].response).toBeUndefined();\n    });\n\n    await thenAssert(\"the summary shows participants, round_count, and latest status\", async () => {\n      const summary = result.summary as Record<"+"string, unknown>;\n      expect(summary.participants).toEqual([\"alice\", \"bob\"]);\n      expect(summary.round_count).toBe(2);\n      expect(summary.latest_status).toBe(\"pending\");\n      expect(summary.request_type).toBe(\"sanity-check\");\n    });\n  });\n\n  it(\"retrieves single-round completed thread\", async () => {\n    ctx = createTestRepos();\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n    let threadId: string;\n\n    await given(\"Alice sends a request and Bob responds\", async () => {\n      const r = (await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Quick question\" },\n      })) as { request_id: string; thread_id: string };\n      threadId = r.thread_id;\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: r.request_id,\n        response_bundle: { answer: \"Yes\" },\n      });\n    });\n\n    let result: Record<"+"string, unknown>;\n\n    await when(\"Alice calls garp_thread\", async () => {\n      result = (await aliceServer.callTool(\"garp_thread\", {\n        thread_id: threadId,\n      })) as Record<"+"string, unknown>;\n    });\n\n    await thenAssert(\"the result has 1 entry with request and response\", async () => {\n      const entries = result.entries as Array<"+"{ request: Record<"+"string, unknown>; response?: Record<"+"string, unknown> }>;\n      expect(entries).toHaveLength(1);\n      expect(entries[0].response).toBeDefined();\n      const summary = result.summary as Record<"+"string, unknown>;\n      expect(summary.round_count).toBe(1);\n      expect(summary.latest_status).toBe(\"completed\");\n    });\n  });\n\n  it(\"returns empty result with message when thread not found\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let result: Record<"+"string, unknown>;\n\n    await when(\"Alice calls garp_thread with a non-existent thread_id\", async () => {\n      result = (await server.callTool(\"garp_thread\", {\n        thread_id: \"req-nonexistent\",\n      })) as Record<"+"string, unknown>;\n    });\n\n    await thenAssert(\"the result has 0 entries and a helpful message\", async () => {\n      const entries = result.entries as unknown[];\n      expect(entries).toHaveLength(0);\n      expect(result.message).toBe(\"No requests found for this thread\");\n      const summary = result.summary as Record<"+"string, unknown>;\n      expect(summary.round_count).toBe(0);\n    });\n  });\n\n  it(\"thread is viewable from any user's server (not tied to sender)\", async () => {\n    ctx = createTestRepos();\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n    let threadId: string;\n\n    await given(\"Alice sends a request to Bob\", async () => {\n      const r = (await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Can Bob see this thread too?\" },\n      })) as { request_id: string; thread_id: string };\n      threadId = r.thread_id;\n    });\n\n    let result: Record<"+"string, unknown>;\n\n    await when(\"Bob calls garp_thread with the thread_id\", async () => {\n      result = (await bobServer.callTool(\"garp_thread\", {\n        thread_id: threadId,\n      })) as Record<"+"string, unknown>;\n    });\n\n    await thenAssert(\"Bob sees the thread with 1 entry\", async () => {\n      const entries = result.entries as unknown[];\n      expect(entries).toHaveLength(1);\n    });\n  });\n});\n"},"tests/acceptance/walking-skeleton.test.ts":{"tests":[{"id":"78","name":"Walking Skeleton: complete round-trip Alice sends a request, Bob receives and responds, Alice sees the response"},{"id":"79","name":"Walking Skeleton: complete round-trip git log shows structured commit messages for the full round-trip"},{"id":"80","name":"Walking Skeleton: complete round-trip request and response are accessible from a fresh server instance"}],"source":"/**\n * Walking Skeleton -- Complete Round-Trip Acceptance Test\n *\n * Traces to: US-001, US-008\n *\n * This is the FIRST and most important acceptance test. It proves the\n * entire GARP loop works end-to-end:\n *\n *   1. Repo exists with correct directory structure\n *   2. Alice submits a sanity-check request to Bob via garp_request\n *   3. Bob checks inbox via garp_inbox and sees the request\n *   4. Bob responds via garp_respond with findings\n *   5. Alice checks status via garp_status and sees the response\n *\n * The test exercises all 4 driving ports (MCP tool handlers) against\n * real local git repos. No mocks, no network -- just bare repos on\n * the filesystem simulating the GitHub remote.\n *\n * Implementation note: The test calls tool handlers directly (the\n * driving ports), not through MCP JSON-RPC. The tool handlers are\n * the public API boundary of the GARP server.\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  listDir,\n  readRepoJSON,\n  fileExists,\n  lastCommitMessage,\n  allCommitMessages,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { createGarpServer } from \"../../src/server.js\";\n\ndescribe(\"Walking Skeleton: complete round-trip\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // WALKING SKELETON 1: Full request-respond lifecycle\n  // =========================================================================\n\n  it(\"Alice sends a request, Bob receives and responds, Alice sees the response\", async () => {\n    ctx = createTestRepos();\n\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const bobServer   = createGarpServer({ repoPath: ctx.bobRepo,   userId: \"bob\" });\n\n    let requestId: string;\n\n    // --- Given: repo structure exists with skill and team config ---\n\n    await given(\"repo has standard directory structure and team config\", async () => {\n      expect(fileExists(ctx.aliceRepo, \"config.json\")).toBe(true);\n      expect(fileExists(ctx.aliceRepo, \"skills/sanity-check/SKILL.md\")).toBe(true);\n      expect(fileExists(ctx.aliceRepo, \"requests/pending/.gitkeep\")).toBe(true);\n      expect(fileExists(ctx.aliceRepo, \"requests/completed/.gitkeep\")).toBe(true);\n      expect(fileExists(ctx.aliceRepo, \"responses/.gitkeep\")).toBe(true);\n    });\n\n    // --- When: Alice submits a sanity-check request to Bob ---\n\n    await when(\"Alice submits a sanity-check request to Bob\", async () => {\n      const result = await aliceServer.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: {\n          customer: \"Acme Corp\",\n          product: \"Platform v3.2\",\n          issue_summary: \"Refresh tokens not garbage collected\",\n          involved_files: \"src/auth/refresh.ts:L45-90\",\n          investigation_so_far: \"Token references held in closure, preventing GC\",\n          question: \"Does this match the session service pattern from last month?\",\n        },\n      }) as { request_id: string };\n      requestId = result.request_id;\n      expect(requestId).toMatch(/^req-\\d{8}-\\d{6}-alice-[0-9a-f]{4}$/);\n    });\n\n    // --- Then: request file exists in pending directory ---\n\n    await thenAssert(\"request file appears in pending directory on the remote\", async () => {\n      gitPull(ctx.bobRepo);\n      const pendingFiles = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(pendingFiles).toHaveLength(1);\n      expect(pendingFiles[0]).toContain(requestId);\n\n      const envelope = readRepoJSON(ctx.bobRepo, `requests/pending/${pendingFiles[0]}`);\n      expect(envelope).toMatchObject({\n        request_id: requestId,\n        request_type: \"sanity-check\",\n        status: \"pending\",\n        sender: { user_id: \"alice\", display_name: \"Alice\" },\n        recipient: { user_id: \"bob\", display_name: \"Bob\" },\n      });\n    });\n\n    // --- When: Bob checks inbox and sees the request ---\n\n    await when(\"Bob checks inbox and sees one pending request\", async () => {\n      const inbox = await bobServer.callTool(\"garp_inbox\", {}) as { requests: any[] };\n      expect(inbox.requests).toHaveLength(1);\n      expect(inbox.requests[0].request_id).toBe(requestId);\n      expect(inbox.requests[0].request_type).toBe(\"sanity-check\");\n      expect(inbox.requests[0].sender).toBe(\"Alice\");\n      expect(inbox.requests[0].skill_path).toContain(\"skills/sanity-check/SKILL.md\");\n    });\n\n    // --- When: Bob responds with findings ---\n\n    await when(\"Bob responds with investigation findings\", async () => {\n      const response = await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: {\n          answer: \"YES - same pattern as ZD-4102\",\n          evidence: \"Compared refresh.ts:L45-90 with cleanup.ts:L30-60\",\n          concerns: \"The token-cache module may have the same issue\",\n          recommendation: \"Apply finally-block cleanup, reference ZD-4102 fix\",\n        },\n      }) as { status: string };\n      expect(response.status).toBe(\"completed\");\n    });\n\n    // --- Then: request moved to completed, response file exists ---\n\n    await thenAssert(\"request is in completed directory and response file exists\", async () => {\n      gitPull(ctx.aliceRepo);\n\n      // Request moved from pending to completed\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n\n      const completed = listDir(ctx.aliceRepo, \"requests/completed\");\n      expect(completed).toHaveLength(1);\n      expect(completed[0]).toContain(requestId);\n\n      // Response file exists\n      const responseFile = `responses/${requestId}.json`;\n      expect(fileExists(ctx.aliceRepo, responseFile)).toBe(true);\n\n      const responseData = readRepoJSON(ctx.aliceRepo, responseFile) as any;\n      expect(responseData).toMatchObject({\n        request_id: requestId,\n        responder: { user_id: \"bob\", display_name: \"Bob\" },\n        response_bundle: {\n          answer: \"YES - same pattern as ZD-4102\",\n        },\n      });\n    });\n\n    // --- When: Alice checks status ---\n\n    await when(\"Alice checks status of her request\", async () => {\n      const status = await aliceServer.callTool(\"garp_status\", {\n        request_id: requestId,\n      }) as any;\n      expect(status.status).toBe(\"completed\");\n      expect(status.response.responder.display_name).toBe(\"Bob\");\n      expect(status.response.response_bundle.answer).toBe(\n        \"YES - same pattern as ZD-4102\",\n      );\n      expect(status.response.response_bundle.recommendation).toContain(\"ZD-4102\");\n    });\n  });\n\n  // =========================================================================\n  // WALKING SKELETON 2: Git audit trail\n  // =========================================================================\n\n  it(\"git log shows structured commit messages for the full round-trip\", async () => {\n    ctx = createTestRepos();\n\n    const aliceServer = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const bobServer   = createGarpServer({ repoPath: ctx.bobRepo,   userId: \"bob\" });\n\n    // Execute a complete round-trip\n    const result = await aliceServer.callTool(\"garp_request\", {\n      request_type: \"sanity-check\",\n      recipient: \"bob\",\n      context_bundle: {\n        customer: \"Acme Corp\",\n        product: \"Platform v3.2\",\n        issue_summary: \"Audit trail test\",\n        question: \"Does the audit trail work?\",\n      },\n    }) as { request_id: string };\n    const requestId = result.request_id;\n\n    gitPull(ctx.bobRepo);\n\n    await bobServer.callTool(\"garp_respond\", {\n      request_id: requestId,\n      response_bundle: {\n        answer: \"YES\",\n        recommendation: \"Ship it\",\n      },\n    });\n\n    gitPull(ctx.aliceRepo);\n    const messages = allCommitMessages(ctx.aliceRepo);\n\n    // Most recent first -- response commit, then request commit\n    expect(messages[0]).toMatch(/\\[garp\\] response:.*sanity-check.*bob -> alice/);\n    expect(messages[1]).toMatch(/\\[garp\\] new request:.*sanity-check.*-> bob/);\n  });\n\n  // =========================================================================\n  // WALKING SKELETON 3: Session independence (request and response persist)\n  // =========================================================================\n\n  it(\"request and response are accessible from a fresh server instance\", async () => {\n    ctx = createTestRepos();\n\n    // --- Session A: Alice sends request ---\n    const aliceSessionA = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const result = await aliceSessionA.callTool(\"garp_request\", {\n      request_type: \"sanity-check\",\n      recipient: \"bob\",\n      context_bundle: { question: \"Test question\" },\n    }) as { request_id: string };\n    const requestId = result.request_id;\n\n    // --- Bob responds ---\n    const bobSession = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n    gitPull(ctx.bobRepo);\n    await bobSession.callTool(\"garp_respond\", {\n      request_id: requestId,\n      response_bundle: { answer: \"Confirmed\" },\n    });\n\n    // --- Session B: Alice checks from a new server instance ---\n    const aliceSessionB = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n    const status = await aliceSessionB.callTool(\"garp_status\", {\n      request_id: requestId,\n    }) as any;\n    expect(status.status).toBe(\"completed\");\n    expect(status.response.response_bundle.answer).toBe(\"Confirmed\");\n  });\n});\n"},"tests/integration/adapters/config-adapter.test.ts":{"tests":[{"id":"81","name":"ConfigAdapter reads config.json and returns team members with user_id and display_name"},{"id":"82","name":"ConfigAdapter looks up a valid user_id and returns the matching member record"},{"id":"83","name":"ConfigAdapter returns undefined when looking up a non-existent user_id"}],"source":"/**\n * Integration tests for ConfigAdapter.\n *\n * Tests use real filesystem with temp directories containing config.json.\n * The adapter reads config.json from the repo root and parses with Zod.\n *\n * Test Budget: 2 behaviors (read team members, lookup user) x 2 = 4 max\n */\n\nimport { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { mkdtempSync, rmSync, writeFileSync } from \"node:fs\";\nimport { tmpdir } from \"node:os\";\nimport { join } from \"node:path\";\nimport { ConfigAdapter } from \"../../../src/adapters/config-adapter.ts\";\n\ndescribe(\"ConfigAdapter\", () => {\n  let repoPath: string;\n\n  const validConfig = {\n    team_name: \"Test Team\",\n    version: 1,\n    members: [\n      { user_id: \"alice\", display_name: \"Alice\" },\n      { user_id: \"bob\", display_name: \"Bob\" },\n    ],\n  };\n\n  beforeEach(() => {\n    repoPath = mkdtempSync(join(tmpdir(), \"garp-config-\"));\n    writeFileSync(join(repoPath, \"config.json\"), JSON.stringify(validConfig, null, 2));\n  });\n\n  afterEach(() => {\n    rmSync(repoPath, { recursive: true, force: true });\n  });\n\n  it(\"reads config.json and returns team members with user_id and display_name\", async () => {\n    const adapter = new ConfigAdapter(repoPath);\n\n    const members = await adapter.readTeamMembers();\n\n    expect(members).toHaveLength(2);\n    expect(members[0]).toEqual({ user_id: \"alice\", display_name: \"Alice\" });\n    expect(members[1]).toEqual({ user_id: \"bob\", display_name: \"Bob\" });\n  });\n\n  it(\"looks up a valid user_id and returns the matching member record\", async () => {\n    const adapter = new ConfigAdapter(repoPath);\n\n    const member = await adapter.lookupUser(\"bob\");\n\n    expect(member).toEqual({ user_id: \"bob\", display_name: \"Bob\" });\n  });\n\n  it(\"returns undefined when looking up a non-existent user_id\", async () => {\n    const adapter = new ConfigAdapter(repoPath);\n\n    const member = await adapter.lookupUser(\"charlie\");\n\n    expect(member).toBeUndefined();\n  });\n});\n"},"tests/unit/mcp-server.test.ts":{"tests":[{"id":"84","name":"MCP server wiring registers all GARP tools"},{"id":"85","name":"MCP server wiring createMcpServer throws when repoPath is empty"},{"id":"86","name":"MCP server wiring createMcpServer throws when userId is empty"}],"source":"/**\n * Unit tests for GARP MCP server wiring.\n *\n * Tests enter through the MCP protocol (driving port) using InMemoryTransport\n * to verify tool registration and env var validation.\n *\n * Test Budget: 2 behaviors (tool registration, env var validation) x 2 = 4 max\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { Client } from \"@modelcontextprotocol/sdk/client/index.js\";\nimport { InMemoryTransport } from \"@modelcontextprotocol/sdk/inMemory.js\";\nimport { createMcpServer } from \"../../src/mcp-server.ts\";\n\ndescribe(\"MCP server wiring\", () => {\n  it(\"registers all GARP tools\", async () => {\n    const mcpServer = createMcpServer({ repoPath: \"/tmp/test-repo\", userId: \"alice\" });\n    const client = new Client({ name: \"test-client\", version: \"1.0.0\" });\n    const [clientTransport, serverTransport] = InMemoryTransport.createLinkedPair();\n\n    await mcpServer.connect(serverTransport);\n    await client.connect(clientTransport);\n\n    const result = await client.listTools();\n    const toolNames = result.tools.map((t) => t.name).sort();\n\n    expect(toolNames).toEqual([\"garp_amend\", \"garp_cancel\", \"garp_inbox\", \"garp_request\", \"garp_respond\", \"garp_status\", \"garp_thread\"]);\n\n    await client.close();\n    await mcpServer.close();\n  });\n\n  it(\"createMcpServer throws when repoPath is empty\", () => {\n    expect(() => createMcpServer({ repoPath: \"\", userId: \"alice\" })).toThrow(\"repoPath\");\n  });\n\n  it(\"createMcpServer throws when userId is empty\", () => {\n    expect(() => createMcpServer({ repoPath: \"/tmp/repo\", userId: \"\" })).toThrow(\"userId\");\n  });\n});\n"},"tests/unit/schemas.test.ts":{"tests":[{"id":"87","name":"RequestEnvelopeSchema parses a valid request envelope with all required fields"},{"id":"88","name":"RequestEnvelopeSchema parses a request envelope with optional fields"},{"id":"89","name":"RequestEnvelopeSchema rejects a request envelope missing required fields"},{"id":"90","name":"RequestEnvelopeSchema parses a request envelope with thread_id"},{"id":"91","name":"RequestEnvelopeSchema parses a request envelope with attachments array"},{"id":"92","name":"RequestEnvelopeSchema parses a request envelope with both thread_id and attachments"},{"id":"93","name":"ResponseEnvelopeSchema parses a valid response envelope"},{"id":"94","name":"TeamConfigSchema parses a valid team config"},{"id":"95","name":"AmendmentEntrySchema parses a valid amendment entry with all fields including optional note"},{"id":"96","name":"AmendmentEntrySchema parses a valid amendment entry without optional note"},{"id":"97","name":"AmendmentEntrySchema rejects amendment entry missing amended_at"},{"id":"98","name":"AmendmentEntrySchema rejects amendment entry missing amended_by"},{"id":"99","name":"RequestEnvelopeSchema amendments and cancel_reason parses an envelope with amendments array preserved"},{"id":"100","name":"RequestEnvelopeSchema amendments and cancel_reason parses an envelope with cancel_reason"},{"id":"101","name":"RequestEnvelopeSchema amendments and cancel_reason parses an envelope without amendments or cancel_reason (backward compatible)"}],"source":"/**\n * Unit tests for GARP Zod schemas.\n *\n * Tests enter through the schema parsing API (the driving port for validation).\n * Each test validates observable behavior: parse succeeds or fails with\n * specific error structure.\n *\n * Test Budget: 3 behaviors (valid envelope, invalid envelope, response+config) x 2 = 6 max\n * + 3 protocol extension tests (thread_id, attachments, combined)\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  RequestEnvelopeSchema,\n  ResponseEnvelopeSchema,\n  TeamConfigSchema,\n  AmendmentEntrySchema,\n} from \"../../src/schemas.ts\";\n\ndescribe(\"RequestEnvelopeSchema\", () => {\n  const validRequest = {\n    request_id: \"req-20260221-143022-alice-a1b2\",\n    request_type: \"sanity-check\",\n    sender: { user_id: \"alice\", display_name: \"Alice\" },\n    recipient: { user_id: \"bob\", display_name: \"Bob\" },\n    status: \"pending\",\n    created_at: \"2026-02-21T14:30:22Z\",\n    context_bundle: { question: \"Does this look right?\" },\n  };\n\n  it(\"parses a valid request envelope with all required fields\", () => {\n    const result = RequestEnvelopeSchema.safeParse(validRequest);\n    expect(result.success).toBe(true);\n    if (result.success) {\n      expect(result.data.request_id).toBe(\"req-20260221-143022-alice-a1b2\");\n      expect(result.data.sender.user_id).toBe(\"alice\");\n      expect(result.data.status).toBe(\"pending\");\n    }\n  });\n\n  it(\"parses a request envelope with optional fields\", () => {\n    const withOptional = {\n      ...validRequest,\n      deadline: \"2026-02-22T14:30:22Z\",\n      expected_response: { type:
