t { RequestEnvelopeSchema } from \"../schemas.ts\";\nimport type { RequestEnvelope } from \"../schemas.ts\";\n\nexport interface FindPendingResult {\n  envelope: RequestEnvelope;\n  pendingPath: string;\n}\n\n/**\n * Locate a request in pending/ and return its parsed envelope.\n *\n * Throws with a descriptive message if the request is not pending:\n * - \"already completed and cannot be {action}\" if in completed/\n * - \"already cancelled and cannot be {action}\" if in cancelled/\n * - \"not found\" if absent from all directories\n * - \"Malformed request envelope\" if the JSON fails schema validation\n */\nexport async function findPendingRequest(\n  requestId: string,\n  file: FilePort,\n  action: string,\n): Promise<"+"FindPendingResult> {\n  const filename = `${requestId}.json`;\n  const pendingPath = `requests/pending/${filename}`;\n\n  const pendingFiles = await file.listDirectory(\"requests/pending\");\n  if (!pendingFiles.includes(filename)) {\n    const completedFiles = await file.listDirectory(\"requests/completed\");\n    if (completedFiles.includes(filename)) {\n      throw new Error(`Request ${requestId} is already completed and cannot be ${action}`);\n    }\n\n    const cancelledFiles = await file.listDirectory(\"requests/cancelled\");\n    if (cancelledFiles.includes(filename)) {\n      throw new Error(`Request ${requestId} is already cancelled and cannot be ${action}`);\n    }\n\n    throw new Error(`Request ${requestId} not found`);\n  }\n\n  const raw = await file.readJSON<"+"unknown>(pendingPath);\n  const parsed = RequestEnvelopeSchema.safeParse(raw);\n  if (!parsed.success) {\n    throw new Error(\n      `Malformed request envelope for ${requestId}: ${parsed.error.issues.map((i) => i.message).join(\", \")}`,\n    );\n  }\n\n  return { envelope: parsed.data, pendingPath };\n}\n"},"src/tools/garp-amend.ts":{"language":"typescript","mutants":[{"id":"38","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"cover hemas.ts\";\nimport { log } from \"../logger.ts\";\n\nexport interface GarpInboxContext {\n  userId: string;\n  repoPath: string;\n  git: GitPort;\n  file: FilePort;\n}\n\nexport interface InboxEntry {\n  request_id: string;\n  short_id: string;\n  thread_id?: string;\n  request_type: string;\n  sender: string;\n  created_at: string;\n  summary: string;\n  skill_path: string;\n  attachment_count: number;\n  amendment_count: number;\n  attachments?: Array<"+"{ filename: string; description: string }>;\n}\n\nexport interface InboxThreadGroup {\n  is_thread_group: true;\n  thread_id: string;\n  request_type: string;\n  sender: string;\n  round_count: number;\n  latest_request_id: string;\n  latest_short_id: string;\n  latest_summary: string;\n  created_at: string;\n  request_ids: string[];\n  skill_path: string;\n  attachment_count: number;\n  amendment_count: number;\n}\n\nexport interface InboxResult {\n  requests: Array<"+"InboxEntry | InboxThreadGroup>;\n  warning?: string;\n}\n\nexport async function handleGarpInbox(\n  _params: Record<"+"string, unknown>,\n  ctx: GarpInboxContext,\n): Promise<"+"InboxResult> {\n  let warning: string | undefined;\n\n  // 1. Pull latest (catch failure, set warning)\n  try {\n    await ctx.git.pull();\n  } catch {\n    warning = \"Using local data (remote unreachable). Results may be stale.\";\n  }\n\n  // 2. List pending directory\n  const files = await ctx.file.listDirectory(\"requests/pending\");\n\n  // 3. Parse each through schema, filter by recipient == userId\n  const entries: InboxEntry[] = [];\n  for (const file of files) {\n    const raw = await ctx.file.readJSON<"+"unknown>(`requests/pending/${file}`);\n    const parsed = RequestEnvelopeSchema.safeParse(raw);\n    if (!parsed.success) {\n      log(\"warn\", \"skipping malformed envelope\", { file, errors: parsed.error.issues });\n      continue;\n    }\n    const envelope = parsed.data;\n    if (envelope.recipient.user_id === ctx.userId) {\n      const bundle = envelope.context_bundle as Record<"+"string, unknown>;\n      const parts = envelope.request_id.split(\"-\");\n      const shortId = parts.slice(-2).join(\"-\");\n      entries.push({\n        request_id: envelope.request_id,\n        short_id: shortId,\n        ...(envelope.thread_id ? { thread_id: envelope.thread_id } : {}),\n        request_type: envelope.request_type,\n        sender: envelope.sender.display_name,\n        created_at: envelope.created_at,\n        summary:\n          (bundle.question as string) ??\n          (bundle.issue_summary as string) ??\n          \"No summary\",\n        skill_path: `${ctx.repoPath}/skills/${envelope.request_type}/SKILL.md`,\n        attachment_count: envelope.attachments?.length ?? 0,\n        amendment_count: envelope.amendments?.length ?? 0,\n        ...(envelope.attachments && envelope.attachments.length > 0\n          ? { attachments: envelope.attachments.map(a => ({ filename: a.filename, description: a.description })) }\n          : {}),\n      });\n    }\n  }\n\n  // 4. Group by thread_id\n  const threadGroups = new Map<"+"string, InboxEntry[]>();\n  for (const entry of entries) {\n    // Use thread_id as key, or request_id for entries without thread_id (always standalone)\n    const key = entry.thread_id ?? entry.request_id;\n    const group = threadGroups.get(key);\n    if (group) {\n      group.push(entry);\n    } else {\n      threadGroups.set(key, [entry]);\n    }\n  }\n\n  // 5. Emit standalone or grouped items\n  const requests: Array<"+"InboxEntry | InboxThreadGroup> = [];\n  for (const [key, group] of threadGroups) {\n    if (group.length === 1) {\n      // Standalone: single pending entry in this thread (or no thread_id)\n      requests.push(group[0]);\n    } else {\n      // Thread group: 2+ pending entries share a thread_id\n      // Sort group by created_at ascending to find latest\n      group.sort(\n        (a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime(),\n      );\n      const latest = group[group.length - 1];\n      requests.push({\n        is_thread_group: true,\n        thread_id: key,\n        request_type: latest.request_type,\n        sender: latest.sender,\n        round_count: group.length,\n        latest_request_id: latest.request_id,\n        latest_short_id: latest.short_id,\n        latest_summary: latest.summary,\n        created_at: latest.created_at,\n        request_ids: group.map((e) => e.request_id),\n        skill_path: latest.skill_path,\n        attachment_count: group.reduce((sum, e) => sum + e.attachment_count, 0),\n        amendment_count: group.reduce((sum, e) => sum + e.amendment_count, 0),\n      });\n    }\n  }\n\n  // 6. Sort all items by created_at ascending (oldest first)\n  requests.sort(\n    (a, b) => {\n      const aTime = new Date(a.created_at).getTime();\n      const bTime = new Date(b.created_at).getTime();\n      return aTime - bTime;\n    },\n  );\n\n  return { requests, ...(warning ? { warning } : {}) };\n}\n"},"src/tools/garp-respond.ts":{"language":"typescript","mutants":[{"id":"156","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":79,"line":31},"start":{"column":43,"line":31}}},{"id":"171","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":48},"start":{"column":41,"line":46}}},{"id":"172","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":36,"line":47},"start":{"column":19,"line":47}}},{"id":"184","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":62},"start":{"column":24,"line":60}}},{"id":"185","mutatorName":"StringLiteral","replacement":"``","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":131,"line":61},"start":{"column":21,"line gFiles.includes(filename)) {\n    sourceDir = \"requests/pending\";\n  } else {\n    const activeFiles = await ctx.file.listDirectory(\"requests/active\");\n    if (activeFiles.includes(filename)) {\n      sourceDir = \"requests/active\";\n    } else {\n      const completedFiles = await ctx.file.listDirectory(\"requests/completed\");\n      if (completedFiles.includes(filename)) {\n        throw new Error(`Request ${params.request_id} is already completed`);\n      }\n      throw new Error(`Request ${params.request_id} not found in any directory`);\n    }\n  }\n\n  // 4. Read request envelope, validate schema, verify current user is recipient\n  const raw = await ctx.file.readJSON<"+"unknown>(`${sourceDir}/${filename}`);\n  const parsed = RequestEnvelopeSchema.safeParse(raw);\n  if (!parsed.success) {\n    throw new Error(`Malformed request envelope for ${params.request_id}: ${parsed.error.issues.map((i) => i.message).join(\", \")}`);\n  }\n  const envelope = parsed.data;\n  if (envelope.recipient.user_id !== ctx.userId) {\n    throw new Error(`You are not the recipient of request ${params.request_id}`);\n  }\n\n  // 5. Update status to \"completed\" before moving (US-015)\n  const updatedEnvelope = { ...raw as Record<"+"string, unknown>, status: \"completed\" };\n  await ctx.file.writeJSON(`${sourceDir}/${filename}`, updatedEnvelope);\n\n  // 6. Look up responder from config\n  const responder = await ctx.config.lookupUser(ctx.userId);\n\n  // 7. Write response file\n  const response = {\n    request_id: params.request_id,\n    responder: { user_id: responder!.user_id, display_name: responder!.display_name },\n    responded_at: new Date().toISOString(),\n    response_bundle: params.response_bundle,\n  };\n  await ctx.file.writeJSON(`responses/${params.request_id}.json`, response);\n\n  // 8. Git mv request to completed\n  await ctx.git.mv(`${sourceDir}/${filename}`, `requests/completed/${filename}`);\n\n  // 9. Atomic commit (both response write + request move)\n  await ctx.git.add([`responses/${params.request_id}.json`, `requests/completed/${filename}`]);\n  const senderUserId = envelope.sender.user_id;\n  await ctx.git.commit(\n    `[garp] response: ${params.request_id} (${envelope.request_type}) ${ctx.userId} -> ${senderUserId}`,\n  );\n\n  // 10. Push\n  await ctx.git.push();\n\n  return { status: \"completed\", request_id: params.request_id, message: \"Response submitted\" };\n}\n"},"src/tools/garp-status.ts":{"language":"typescript","mutants":[{"id":"212","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":40},"start":{"column":24,"line":37}}},{"id":"213","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":15,"line":38},"start":{"column":9,"line":38}}},{"id":"214","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":45,"line":38},"start":{"column":17,"line":38}}},{"id":"215","mutatorName":"ObjectLiteral","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":101,"line":38},"start":{"column":47,"line":38}}},{"id":"220","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":49},"start":{"column":24,"line":46}}},{"id":"221","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":15,"line":47},"start":{"column":9,"line":47}}},{"id":"222","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":46,"line":47},"start":{"column":17,"line":47}}},{"id":"223","mutatorName":"ObjectLiteral","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":102,"line":47},"start":{"column": lopeSchema.safeParse(raw);\n  if (!parsed.success) {\n    log(\"warn\", \"malformed request envelope\", { request_id: requestId, errors: parsed.error.issues });\n    return raw; // Return raw data so the user still sees something\n  }\n  return parsed.data;\n}\n\nfunction parseResponseEnvelope(raw: unknown, requestId: string): unknown {\n  const parsed = ResponseEnvelopeSchema.safeParse(raw);\n  if (!parsed.success) {\n    log(\"warn\", \"malformed response envelope\", { request_id: requestId, errors: parsed.error.issues });\n    return raw;\n  }\n  return parsed.data;\n}\n\n/** Parse raw JSON into a typed envelope for attachment resolution. Falls back to a minimal stub. */\nfunction tryParseEnvelope(raw: unknown, requestId: string): { attachments?: Array<"+"{ filename: string; description: string }>; request_id: string } {\n  const parsed = RequestEnvelopeSchema.safeParse(raw);\n  if (parsed.success) return parsed.data;\n  return { request_id: requestId };\n}\n\nfunction resolveAttachmentPaths(\n  envelope: { attachments?: Array<"+"{ filename: string; description: string }>; request_id: string },\n  repoPath: string,\n): Array<"+"{ filename: string; description: string; path: string }> | undefined {\n  if (!envelope.attachments || envelope.attachments.length === 0) return undefined;\n  return envelope.attachments.map(a => ({\n    filename: a.filename,\n    description: a.description,\n    path: join(repoPath, \"attachments\", envelope.request_id, a.filename),\n  }));\n}\n\nexport async function handleGarpStatus(\n  params: GarpStatusParams,\n  ctx: GarpStatusContext,\n): Promise<"+"GarpStatusResult> {\n  if (!params.request_id) throw new Error(\"Missing required field: request_id\");\n\n  let warning: string | undefined;\n\n  // 1. Pull latest (catch failure, set warning)\n  try {\n    await ctx.git.pull();\n  } catch {\n    warning = \"Using local data (remote unreachable). Results may be stale.\";\n  }\n\n  // 2. Search pending/\n  const pendingFiles = await ctx.file.listDirectory(\"requests/pending\");\n  if (pendingFiles.includes(`${params.request_id}.json`)) {\n    const raw = await ctx.file.readJSON<"+"unknown>(`requests/pending/${params.request_id}.json`);\n    const request = parseRequestEnvelope(raw, params.request_id);\n    const attachment_paths = resolveAttachmentPaths(tryParseEnvelope(raw, params.request_id), ctx.repoPath);\n    return { status: \"pending\", request, response: undefined, ...(attachment_paths ? { attachment_paths } : {}), ...(warning ? { warning } : {}) };\n  }\n\n  // 3. Search active/ (Tier 2: brain service acknowledges request)\n  const activeFiles = await ctx.file.listDirectory(\"requests/active\");\n  if (activeFiles.includes(`${params.request_id}.json`)) {\n    const raw = await ctx.file.readJSON<"+"unknown>(`requests/active/${params.request_id}.json`);\n    const request = parseRequestEnvelope(raw, params.request_id);\n    const attachment_paths = resolveAttachmentPaths(tryParseEnvelope(raw, params.request_id), ctx.repoPath);\n    return { status: \"active\", request, response: undefined, ...(attachment_paths ? { attachment_paths } : {}), ...(warning ? { warning } : {}) };\n  }\n\n  // 4. Search completed/\n  const completedFiles = await ctx.file.listDirectory(\"requests/completed\");\n  if (completedFiles.includes(`${params.request_id}.json`)) {\n    const raw = await ctx.file.readJSON<"+"unknown>(`requests/completed/${params.request_id}.json`);\n    const request = parseRequestEnvelope(raw, params.request_id);\n    const response = parseResponseEnvelope(await ctx.file.readJSON<"+"unknown>(`responses/${params.request_id}.json`), params.request_id);\n    const attachment_paths = resolveAttachmentPaths(tryParseEnvelope(raw, params.request_id), ctx.repoPath);\n    return { status: \"completed\", request, response, ...(attachment_paths ? { attachment_paths } : {}), ...(warning ? { warning } : {}) };\n  }\n\n  // 5. Search cancelled/\n  const cancelledFiles = await ctx.file.listDirectory(\"requests/cancelled\");\n  if (cancelledFiles.includes(`${params.request_id}.json`)) {\n    const raw = await ctx.file.readJSON<"+"unknown>(`requests/cancelled/${params.request_id}.json`);\n    const request = parseRequestEnvelope(raw, params.request_id);\n    const attachment_paths = resolveAttachmentPaths(tryParseEnvelope(raw, params.request_id), ctx.repoPath);\n    return { status: \"cancelled\", request, ...(attachment_paths ? { attachment_paths } : {}), ...(warning ? { warning } : {}) };\n  }\n\n  // 6. Not found in pending/, active/, completed/, or cancelled/\n  throw new Error(`Request ${params.request_id} not found in any directory`);\n}\n"},"src/schemas.ts":{"language":"typescript","mutants":[{"id":"0","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice checks the status of her request -- expected undefined to be 'Bob' // Object.is equality","status":"Killed","static":true,"testsCompleted":1,"killedBy":["45"],"coveredBy":[],"location":{"end":{"column":2,"line":19},"start":{"column":32,"line":16}}},{"id":"1","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice checks the status of her request -- The \"path\" argument must be of type string. Received undefined","status":"Killed","static":true,"testsCompleted":27,"killedBy":["49"],"coveredBy":[],"location":{"end":{"column":2,"line":28},"start":{"column":35,"line":25}}},{"id":"3","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice checks status -- expected {} to match object { …(4) }","status":"Killed","static":true,"testsCompleted":3,"killedBy":["47"],"coveredBy":[],"location":{"end":{"column":2,"line":63},"start":{"column":47,"line":49}}},{"id":"4","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice checks the status of her request -- Cannot read properties of undefined (reading 'display_name')","status":"Killed","static":true,"testsCompleted":1,"killedBy":["45"],"coveredBy":[],"location":{"end":{"column":2,"line":76},"start":{"column":48,"line":71}}},{"id":"5","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice submits a sanity-check request to Bob -- Recipient 'bob' not found in team config","status":"Killed","static":true,"testsCompleted":13,"killedBy":["30"],"coveredBy":[],"location":{"end":{"column":2,"line":87},"start":{"column":35,"line":84}}},{"id":"6","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[When] Alice submits a sanity-check request to Bob -- Cannot read properties of undefined (reading 'find')","status":"Killed","static":true,"testsCompleted":1,"killedBy":["30"],"coveredBy":[],"location":{"end":{"column":2,"line":93},"start":{"column":42,"line":89}}},{"id":"2","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"[Then] both amendments are present in order -- expected undefined to deeply equal { customer: 'Acme Corp v2' }","status":"Killed","static":true,"testsCompleted":73,"killedBy":["58"],"coveredBy":[],"location":{"end":{"column":2,"line":41},"start":{"column":46,"line":36}}}],"source":"/**\n * Zod schemas for GARP protocol envelopes and team configuration.\n *\n * These schemas define the rigid contract for request/response data\n * flowing through the GARP system. The context_bundle and response_bundle\n * fields are intentionally flexible (any object) -- the skill contract\n * defines their structure, not the server.\n */\n\nimport { z } from \"zod\";\n\n// ---------------------------------------------------------------------------\n// Shared sub-schemas\n// ---------------------------------------------------------------------------\n\nconst UserRefSchema = z.object({\n  user_id: z.string(),\n  display_name: z.string(),\n});\n\n// ---------------------------------------------------------------------------\n// Attachments\n// ---------------------------------------------------------------------------\n\nconst AttachmentSchema = z.object({\n  filename: z.string(),\n  description: z.string(),\n});\n\nexport type Attachment = z.infer<"+"typeof AttachmentSchema>;\n\n// ---------------------------------------------------------------------------\n// Amendments\n// ---------------------------------------------------------------------------\n\nexport const AmendmentEntrySchema = z.object({\n  amended_at: z.string(),\n  amended_by: z.string(),\n  fields: z.record(z.string(), z.unknown()),\n  note: z.string().optional(),\n});\n\nexport type AmendmentEntry = z.infer<"+"typeof AmendmentEntrySchema>;\n\n// ---------------------------------------------------------------------------\n// Request Envelope\n// ---------------------------------------------------------------------------\n\nexport const RequestEnvelopeSchema = z.object({\n  request_id: z.string(),\n  thread_id: z.string().optional(),\n  request_type: z.string(),\n  sender: UserRefSchema,\n  recipient: UserRefSchema,\n  status: z.string(),\n  created_at: z.string(),\n  deadline: z.string().nullable().optional(),\n  context_bundle: z.record(z.string(), z.unknown()),\n  expected_response: z.record(z.string(), z.unknown()).optional(),\n  attachments: z.array(AttachmentSchema).optional(),\n  amendments: z.array(AmendmentEntrySchema).optional(),\n  cancel_reason: z.string().optional(),\n});\n\nexport type RequestEnvelope = z.infer<"+"typeof RequestEnvelopeSchema>;\n\n// ---------------------------------------------------------------------------\n// Response Envelope\n// ---------------------------------------------------------------------------\n\nexport const ResponseEnvelopeSchema = z.object({\n  request_id: z.string(),\n  responder: UserRefSchema,\n  responded_at: z.string(),\n  response_bundle: z.record(z.string(), z.unknown()),\n});\n\nexport type ResponseEnvelope = z.infer<"+"typeof ResponseEnvelopeSchema>;\n\n// ---------------------------------------------------------------------------\n// Team Configuration\n// ---------------------------------------------------------------------------\n\nconst TeamMemberSchema = z.object({\n  user_id: z.string(),\n  display_name: z.string(),\n});\n\nexport const TeamConfigSchema = z.object({\n  team_name: z.string(),\n  version: z.number(),\n  members: z.array(TeamMemberSchema),\n});\n\nexport type TeamConfig = z.infer<"+"typeof TeamConfigSchema>;\nexport type TeamMember = z.infer<"+"typeof TeamMemberSchema>;\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":60,"break":null},"testFiles":{"tests/acceptance/garp-inbox.test.ts":{"tests":[{"id":"0","name":"garp_inbox: check inbox for pending requests returns one pending request addressed to the current user"},{"id":"1","name":"garp_inbox: check inbox for pending requests only shows requests addressed to the current user, not others"},{"id":"2","name":"garp_inbox: check inbox for pending requests returns requests ordered by creation time, oldest first"},{"id":"3","name":"garp_inbox: check inbox for pending requests includes skill_path so the agent can auto-load the skill file"},{"id":"4","name":"garp_inbox: check inbox for pending requests includes a summary from the context bundle for triage"},{"id":"5","name":"garp_inbox: check inbox for pending requests includes short_id derived from request_id in inbox entries"},{"id":"6","name":"garp_inbox: check inbox for pending requests includes thread_id in inbox entry when the request has one"},{"id":"7","name":"garp_inbox: check inbox for pending requests omits thread_id from inbox entry when the request has none"},{"id":"8","name":"garp_inbox: check inbox for pending requests includes attachment_count in inbox entries"},{"id":"9","name":"garp_inbox: check inbox for pending requests groups pending requests by thread_id when 2+ share the same thread"},{"id":"10","name":"garp_inbox: check inbox for pending requests treats auto-assigned thread_id (thread of one) as standalone"},{"id":"11","name":"garp_inbox: check inbox for pending requests handles pre-Phase-2 requests without thread_id gracefully"},{"id":"12","name":"garp_inbox: check inbox for pending requests includes amendment_count in inbox entries"},{"id":"13","name":"garp_inbox: check inbox for pending requests includes attachment metadata in inbox entries"},{"id":"14","name":"garp_inbox: check inbox for pending requests returns zero results when inbox is empty"},{"id":"15","name":"garp_inbox: check inbox for pending requests does not show requests that have been moved to completed"},{"id":"16","name":"garp_inbox: check inbox for pending requests falls back to local state with a warning when git pull fails"},{"id":"17","name":"garp_inbox: check inbox for pending requests inbox is a read-only operation -- no commits or pushes"}],"source":"/**\n * Acceptance Tests -- garp_inbox (Check GARP Inbox)\n *\n * Traces to: US-003\n *\n * Tests exercise the garp_inbox driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Retrieves pending requests addressed to the current user\n *   - Filters out requests addressed to other users\n *   - Returns empty list when no pending requests exist\n *   - Returns requests ordered by creation time (oldest first)\n *   - Includes skill_path for agent auto-loading\n *   - Falls back to local state when git pull fails\n *   - Returns summary field for triage\n *   - Includes short_id derived from request_id (US-003a)\n *   - Includes thread_id when present in request envelope (US-003a)\n *   - Omits thread_id when not in request envelope (US-003a)\n *   - Includes attachment_count from request envelope (US-003a)\n *\n * Error/edge scenarios: 4 of 13 total (31%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  listDir,\n  readRepoJSON,\n  fileExists,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { writeFileSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { execSync } from \"node:child_process\";\n\nimport { createGarpServer } from \"../../src/server.ts\";\n\n/** Helper to write a fake request file directly into the repo (bypassing garp_request). */\nfunction seedRequest(\n  repoPath: string,\n  opts: {\n    requestId: string;\n    recipient: string;\n    sender: string;\n    senderName: string;\n    requestType?: string;\n    createdAt?: string;\n    question?: string;\n    threadId?: string;\n    attachments?: Array<"+"{ filename: string; description: string }>;\n  },\n): void {\n  const envelope: Record<"+"string, unknown> = {\n    request_id: opts.requestId,\n    request_type: opts.requestType ?? \"sanity-check\",\n    sender: { user_id: opts.sender, display_name: opts.senderName },\n    recipient: {\n      user_id: opts.recipient,\n      display_name: opts.recipient.charAt(0).toUpperCase() + opts.recipient.slice(1),\n    },\n    status: \"pending\",\n    created_at: opts.createdAt ?? new Date().toISOString(),\n    context_bundle: {\n      question: opts.question ?? \"Test question\",\n    },\n  };\n  if (opts.threadId) {\n    envelope.thread_id = opts.threadId;\n  }\n  if (opts.attachments?.length) {\n    envelope.attachments = opts.attachments;\n  }\n  const filePath = join(repoPath, \"requests\", \"pending\", `${opts.requestId}.json`);\n  writeFileSync(filePath, JSON.stringify(envelope, null, 2));\n  execSync(`cd \"${repoPath}\" && git add -A && git commit -m \"seed ${opts.requestId}\" && git push`, {\n    stdio: \"pipe\",\n  });\n}\n\ndescribe(\"garp_inbox: check inbox for pending requests\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"returns one pending request addressed to the current user\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Alice has sent a sanity-check request to Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        question: \"Does this memory leak match the session service pattern?\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(1);\n      expect(inbox.requests[0]).toMatchObject({\n        request_id: \"req-20260221-140000-alice-a1b2\",\n        request_type: \"sanity-check\",\n        sender: \"Alice\",\n      });\n      expect(inbox.requests[0].created_at).toBeDefined();\n    });\n  });\n\n  it(\"only shows requests addressed to the current user, not others\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"the repo has requests for both Bob and Alice\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        question: \"For Bob\",\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140100-bob-c3d4\",\n        recipient: \"alice\",\n        sender: \"bob\",\n        senderName: \"Bob\",\n        question: \"For Alice\",\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140200-alice-e5f6\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        question: \"Also for Bob\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      // Bob should see 2 requests (both addressed to him), not the one for Alice\n      expect(inbox.requests).toHaveLength(2);\n      const ids = inbox.requests.map((r: any) => r.request_id);\n      expect(ids).toContain(\"req-20260221-140000-alice-a1b2\");\n      expect(ids).toContain(\"req-20260221-140200-alice-e5f6\");\n      expect(ids).not.toContain(\"req-20260221-140100-bob-c3d4\");\n    });\n  });\n\n  it(\"returns requests ordered by creation time, oldest first\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Bob has three pending requests created at different times\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-160000-alice-0001\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-21T16:00:00Z\",\n        question: \"Third (newest)\",\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-0002\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-21T14:00:00Z\",\n        question: \"First (oldest)\",\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-150000-alice-0003\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-21T15:00:00Z\",\n        question: \"Second (middle)\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(3);\n      expect(inbox.requests[0].request_id).toBe(\"req-20260221-140000-alice-0002\"); // oldest\n      expect(inbox.requests[1].request_id).toBe(\"req-20260221-150000-alice-0003\"); // middle\n      expect(inbox.requests[2].request_id).toBe(\"req-20260221-160000-alice-0001\"); // newest\n    });\n  });\n\n  it(\"includes skill_path so the agent can auto-load the skill file\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a sanity-check request exists for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests[0].skill_path).toContain(\n        \"skills/sanity-check/SKILL.md\",\n      );\n    });\n  });\n\n  it(\"includes a summary from the context bundle for triage\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request exists with a question field in the context bundle\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        question: \"Does this memory leak match the session service pattern?\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      // Summary extracted from context_bundle.question\n      expect(inbox.requests[0].summary).toContain(\"memory leak\");\n    });\n  });\n\n  // =========================================================================\n  // Protocol Extensions: short_id, thread_id, attachment_count (US-003a)\n  // =========================================================================\n\n  it(\"includes short_id derived from request_id in inbox entries\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request exists with ID req-20260221-140000-alice-a1b2\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests[0].short_id).toBe(\"alice-a1b2\");\n    });\n  });\n\n  it(\"includes thread_id in inbox entry when the request has one\", async () => {\n    ctx = createTestRepos();\n    const threadId = \"req-20260221-100000-alice-0001\";\n\n    await given(\"a threaded request exists for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        threadId,\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests[0].thread_id).toBe(threadId);\n    });\n  });\n\n  it(\"omits thread_id from inbox entry when the request has none\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request without thread_id exists for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        // No threadId\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(\"thread_id\" in inbox.requests[0]).toBe(false);\n    });\n  });\n\n  it(\"includes attachment_count in inbox entries\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request with 2 attachments and one without exist for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-21T14:00:00Z\",\n        attachments: [\n          { filename: \"crash.log\", description: \"Error log\" },\n          { filename: \"config.yml\", description: \"Config file\" },\n        ],\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-150000-alice-c3d4\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-21T15:00:00Z\",\n        question: \"No attachments here\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(2);\n      // First entry (oldest) has 2 attachments\n      expect(inbox.requests[0].attachment_count).toBe(2);\n      // Second entry has no attachments\n      expect(inbox.requests[1].attachment_count).toBe(0);\n    });\n  });\n\n  // =========================================================================\n  // Thread Grouping (US-011)\n  // =========================================================================\n\n  it(\"groups pending requests by thread_id when 2+ share the same thread\", async () => {\n    ctx = createTestRepos();\n    const threadId = \"req-20260222-100000-alice-0001\";\n\n    await given(\"Bob has 2 pending requests in the same thread and 1 standalone\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260222-100000-alice-0001\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-22T10:00:00Z\",\n        question: \"Round 1: Proposing code-review skill\",\n        threadId,\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260222-110000-alice-0002\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-22T11:00:00Z\",\n        question: \"Round 2: Added language field\",\n        threadId,\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260222-120000-alice-0003\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-22T12:00:00Z\",\n        question: \"Standalone ask\",\n        threadId: \"req-20260222-120000-alice-0003\", // auto-assigned = unique\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      await thenAssert(\"the result contains 2 items (1 group + 1 standalone)\", async () => {\n        expect(inbox.requests).toHaveLength(2);\n      });\n\n      await thenAssert(\"the thread group has correct aggregated fields\", async () => {\n        const group = inbox.requests.find((r: any) => r.is_thread_group);\n        expect(group).toBeDefined();\n        expect(group.thread_id).toBe(threadId);\n        expect(group.round_count).toBe(2);\n        expect(group.latest_summary).toBe(\"Round 2: Added language field\");\n        expect(group.request_ids).toHaveLength(2);\n        expect(group.request_ids).toContain(\"req-20260222-100000-alice-0001\");\n        expect(group.request_ids).toContain(\"req-20260222-110000-alice-0002\");\n      });\n\n      await thenAssert(\"the standalone request has no is_thread_group flag\", async () => {\n        const standalone = inbox.requests.find((r: any) => !r.is_thread_group);\n        expect(standalone).toBeDefined();\n        expect(standalone.request_id).toBe(\"req-20260222-120000-alice-0003\");\n      });\n    });\n  });\n\n  it(\"treats auto-assigned thread_id (thread of one) as standalone\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Bob has 1 request with thread_id = request_id (auto-assigned)\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260222-100000-alice-0001\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        threadId: \"req-20260222-100000-alice-0001\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      await thenAssert(\"the request displays as standalone (not a thread group)\", async () => {\n        expect(inbox.requests).toHaveLength(1);\n        expect(inbox.requests[0].is_thread_group).toBeUndefined();\n        expect(inbox.requests[0].request_id).toBe(\"req-20260222-100000-alice-0001\");\n      });\n    });\n  });\n\n  it(\"handles pre-Phase-2 requests without thread_id gracefully\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"Bob has 2 requests: one with thread_id, one without (pre-Phase-2)\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-old-001\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-20T10:00:00Z\",\n        // No threadId -- pre-Phase-2 request\n      });\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260222-100000-alice-0001\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-22T10:00:00Z\",\n        threadId: \"req-20260222-100000-alice-0001\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      await thenAssert(\"both requests display as standalone items\", async () => {\n        expect(inbox.requests).toHaveLength(2);\n        // Neither should be a thread group\n        expect(inbox.requests.every((r: any) => !r.is_thread_group)).toBe(true);\n      });\n    });\n  });\n\n  // =========================================================================\n  // Amendment & Attachment Surfacing (US-012 partial)\n  // =========================================================================\n\n  it(\"includes amendment_count in inbox entries\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260222-100000-alice-am01\";\n\n    await given(\"a request with 2 amendments exists for Bob\", async () => {\n      const envelope = {\n        request_id: requestId,\n        request_type: \"sanity-check\",\n        sender: { user_id: \"alice\", display_name: \"Alice\" },\n        recipient: { user_id: \"bob\", display_name: \"Bob\" },\n        status: \"pending\",\n        created_at: \"2026-02-22T10:00:00.000Z\",\n        context_bundle: { question: \"Test amendment count\" },\n        amendments: [\n          { amended_at: \"2026-02-22T10:15:00Z\", amended_by: \"alice\", fields: { ticket: \"ZD-1\" } },\n          { amended_at: \"2026-02-22T10:30:00Z\", amended_by: \"alice\", fields: { pr: \"#42\" } },\n        ],\n      };\n      const filePath = join(ctx.aliceRepo, \"requests\", \"pending\", `${requestId}.json`);\n      writeFileSync(filePath, JSON.stringify(envelope, null, 2));\n      execSync(`cd \"${ctx.aliceRepo}\" && git add -A && git commit -m \"seed ${requestId}\" && git push`, {\n        stdio: \"pipe\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(1);\n      expect(inbox.requests[0].amendment_count).toBe(2);\n    });\n  });\n\n  it(\"includes attachment metadata in inbox entries\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260222-100000-alice-at01\";\n\n    await given(\"a request with attachments exists for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId,\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n        createdAt: \"2026-02-22T10:00:00Z\",\n        attachments: [\n          { filename: \"crash.log\", description: \"Error log from production\" },\n          { filename: \"config.yml\", description: \"Current config file\" },\n        ],\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(1);\n      expect(inbox.requests[0].attachments).toEqual([\n        { filename: \"crash.log\", description: \"Error log from production\" },\n        { filename: \"config.yml\", description: \"Current config file\" },\n      ]);\n    });\n  });\n\n  // =========================================================================\n  // Edge Cases / Error Paths\n  // =========================================================================\n\n  it(\"returns zero results when inbox is empty\", async () => {\n    ctx = createTestRepos();\n\n    await when(\"Bob checks inbox with no pending requests\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(0);\n      // Should not throw -- empty inbox is a normal condition\n    });\n  });\n\n  it(\"does not show requests that have been moved to completed\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request was created and then moved to completed\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n      });\n      // Move to completed (simulating garp_respond)\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/req-20260221-140000-alice-a1b2.json requests/completed/ && git commit -m \"complete\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      expect(inbox.requests).toHaveLength(0);\n    });\n  });\n\n  it(\"falls back to local state with a warning when git pull fails\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request exists locally but the remote is unreachable\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n      });\n      gitPull(ctx.bobRepo);\n\n      // Break the remote by renaming it\n      execSync(`mv \"${ctx.remotePath}\" \"${ctx.remotePath}.broken\"`, { stdio: \"pipe\" });\n    });\n\n    await when(\"Bob checks his inbox (remote unreachable)\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const inbox = (await bobServer.callTool(\"garp_inbox\", {})) as any;\n\n      // Should still return locally known requests\n      expect(inbox.requests).toHaveLength(1);\n      expect(inbox.warning).toMatch(/stale|local/i);\n    });\n\n    // Restore remote for cleanup\n    await thenAssert(\"(cleanup) restore remote\", async () => {\n      execSync(`mv \"${ctx.remotePath}.broken\" \"${ctx.remotePath}\"`, { stdio: \"pipe\" });\n    });\n  });\n\n  it(\"inbox is a read-only operation -- no commits or pushes\", async () => {\n    ctx = createTestRepos();\n\n    await given(\"a request exists for Bob\", async () => {\n      seedRequest(ctx.aliceRepo, {\n        requestId: \"req-20260221-140000-alice-a1b2\",\n        recipient: \"bob\",\n        sender: \"alice\",\n        senderName: \"Alice\",\n      });\n    });\n\n    await when(\"Bob checks his inbox\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      // Capture commit count before\n      const commitsBefore = execSync(\n        `cd \"${ctx.bobRepo}\" && git rev-list --count HEAD`,\n        { encoding: \"utf-8\" },\n      ).trim();\n\n      await bobServer.callTool(\"garp_inbox\", {});\n\n      // Commit count should not change (only pull, no new commits)\n      const commitsAfter = execSync(\n        `cd \"${ctx.bobRepo}\" && git rev-list --count HEAD`,\n        { encoding: \"utf-8\" },\n      ).trim();\n\n      // Commits may increase from pull, but Bob should not have authored any\n      // Actually, after pull, the count could change. Better check: no commits by Bob.\n      const bobCommits = execSync(\n        `cd \"${ctx.bobRepo}\" && git log --author=\"Bob\" --oneline | wc -l`,\n        { encoding: \"utf-8\" },\n      ).trim();\n      expect(bobCommits).toBe(\"0\");\n    });\n  });\n});\n"},"tests/acceptance/garp-respond.test.ts":{"tests":[{"id":"18","name":"garp_respond: submit a response to a request writes response, moves request to completed, commits and pushes"},{"id":"19","name":"garp_respond: submit a response to a request response write and request move happen in a single atomic commit"},{"id":"20","name":"garp_respond: submit a response to a request commit message follows structured format"},{"id":"21","name":"garp_respond: submit a response to a request responder identity is set from GARP_USER, not tool input"},{"id":"22","name":"garp_respond: submit a response to a request accepts any response_bundle shape without validation"},{"id":"23","name":"garp_respond: submit a response to a request preserves thread_id and attachments in request envelope after respond moves it to completed"},{"id":"24","name":"garp_respond: submit a response to a request sets envelope status to completed when moving request to completed directory"},{"id":"25","name":"garp_respond: submit a response to a request rejects response when request is already completed"},{"id":"26","name":"garp_respond: submit a response to a request rejects response when current user is not the designated recipient"},{"id":"27","name":"garp_respond: submit a response to a request rejects response when request ID does not exist"},{"id":"28","name":"garp_respond: submit a response to a request rejects response missing required field: response_bundle"},{"id":"29","name":"garp_respond: submit a response to a request retries push after rebase when remote has new commits"}],"source":"/**\n * Acceptance Tests -- garp_respond (Submit a Response)\n *\n * Traces to: US-004\n *\n * Tests exercise the garp_respond driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Successful response with file creation + request move\n *   - Response envelope structure (responder, timestamp, bundle)\n *   - Atomic commit (response write + request move in one commit)\n *   - Rejection when request is already completed\n *   - Rejection when responder is not the designated recipient\n *   - Rejection when request does not exist\n *   - Git push with rebase retry\n *   - Preserves thread_id and attachments during lifecycle move (US-002a)\n *\n * Error/edge scenarios: 5 of 11 total (45%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  seedPendingRequest,\n  listDir,\n  readRepoJSON,\n  fileExists,\n  lastCommitMessage,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { writeFileSync } from \"node:fs\";\nimport { join } from \"node:path\";\nimport { execSync } from \"node:child_process\";\nimport { createGarpServer } from \"../../src/server.ts\";\n\ndescribe(\"garp_respond: submit a response to a request\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"writes response, moves request to completed, commits and pushes\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n    let result: any;\n\n    await given(\"a pending request from Alice exists, addressed to Bob\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds with investigation findings\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      result = await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: {\n          answer: \"YES - same pattern as ZD-4102\",\n          evidence: \"Compared refresh.ts with cleanup.ts\",\n          concerns: \"Token-cache module may have same issue\",\n          recommendation: \"Apply finally-block cleanup\",\n        },\n      });\n\n      expect((result as any).status).toBe(\"completed\");\n    });\n\n    await thenAssert(\"request moves from pending to completed\", async () => {\n      const pending = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n\n      const completed = listDir(ctx.bobRepo, \"requests/completed\");\n      expect(completed).toHaveLength(1);\n      expect(completed[0]).toBe(`${requestId}.json`);\n    });\n\n    await thenAssert(\"response file is created with correct envelope\", async () => {\n      expect(fileExists(ctx.bobRepo, `responses/${requestId}.json`)).toBe(true);\n\n      const response = readRepoJSON<"+"any>(ctx.bobRepo, `responses/${requestId}.json`);\n      expect(response).toMatchObject({\n        request_id: requestId,\n        responder: { user_id: \"bob\", display_name: \"Bob\" },\n        response_bundle: {\n          answer: \"YES - same pattern as ZD-4102\",\n          recommendation: \"Apply finally-block cleanup\",\n        },\n      });\n      expect(response.responded_at).toMatch(/^\\d{4}-\\d{2}-\\d{2}T/);\n    });\n\n    await thenAssert(\"changes reach the remote (Alice can pull them)\", async () => {\n      gitPull(ctx.aliceRepo);\n\n      expect(listDir(ctx.aliceRepo, \"requests/pending\")).toHaveLength(0);\n      expect(listDir(ctx.aliceRepo, \"requests/completed\")).toHaveLength(1);\n      expect(fileExists(ctx.aliceRepo, `responses/${requestId}.json`)).toBe(true);\n    });\n  });\n\n  it(\"response write and request move happen in a single atomic commit\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request from Alice exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Confirmed\" },\n      });\n    });\n\n    await thenAssert(\"both changes appear in a single commit\", async () => {\n      const msg = lastCommitMessage(ctx.bobRepo);\n      expect(msg).toMatch(/\\[garp\\] response:.*sanity-check.*bob -> alice/);\n\n      // Verify single commit: diff of last commit should show both the move and the new file\n      const diffStat = execSync(\n        `cd \"${ctx.bobRepo}\" && git diff --name-status HEAD~1 HEAD`,\n        { encoding: \"utf-8\" },\n      );\n      // Should contain: R (rename/move) for request, A (add) for response\n      expect(diffStat).toContain(\"responses/\");\n      expect(diffStat).toContain(\"requests/completed/\");\n    });\n  });\n\n  it(\"commit message follows structured format\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Yes\" },\n      });\n    });\n\n    await thenAssert(\"commit message is formatted as [garp] response: {id} ({type}) {responder} -> {sender}\", async () => {\n      const msg = lastCommitMessage(ctx.bobRepo);\n      expect(msg).toBe(\n        `[garp] response: ${requestId} (sanity-check) bob -> alice`,\n      );\n    });\n  });\n\n  it(\"responder identity is set from GARP_USER, not tool input\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists for Bob\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds (responder resolved from GARP_USER)\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Checked\" },\n      });\n    });\n\n    await thenAssert(\"response has Bob's identity from config, not tool input\", async () => {\n      const response = readRepoJSON<"+"any>(ctx.bobRepo, `responses/${requestId}.json`);\n      expect(response.responder.user_id).toBe(\"bob\");\n      expect(response.responder.display_name).toBe(\"Bob\");\n    });\n  });\n\n  it(\"accepts any response_bundle shape without validation\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds with a non-standard response bundle\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: {\n          custom_verdict: \"all clear\",\n          metrics: { confidence: 0.95 },\n          tags: [\"verified\", \"no-action\"],\n        },\n      });\n    });\n\n    await thenAssert(\"response file contains the custom bundle as-is\", async () => {\n      const response = readRepoJSON<"+"any>(ctx.bobRepo, `responses/${requestId}.json`);\n      expect(response.response_bundle.custom_verdict).toBe(\"all clear\");\n      expect(response.response_bundle.metrics.confidence).toBe(0.95);\n    });\n  });\n\n  // =========================================================================\n  // Protocol Extensions: thread_id and attachments survive lifecycle (US-002a)\n  // =========================================================================\n\n  it(\"preserves thread_id and attachments in request envelope after respond moves it to completed\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n    const threadId = \"req-20260221-100000-alice-0001\";\n\n    await given(\"a pending request with thread_id and attachments exists\", async () => {\n      const envelope = {\n        request_id: requestId,\n        thread_id: threadId,\n        request_type: \"sanity-check\",\n        sender: { user_id: \"alice\", display_name: \"Alice\" },\n        recipient: { user_id: \"bob\", display_name: \"Bob\" },\n        status: \"pending\",\n        created_at: \"2026-02-21T14:30:22.000Z\",\n        context_bundle: { question: \"Thread + attachment test\" },\n        attachments: [\n          { filename: \"crash.log\", description: \"Application error log\" },\n        ],\n      };\n      writeFileSync(\n        join(ctx.aliceRepo, \"requests\", \"pending\", `${requestId}.json`),\n        JSON.stringify(envelope, null, 2),\n      );\n      execSync(`cd \"${ctx.aliceRepo}\" && git add -A && git commit -m \"seed ${requestId}\" && git push`, {\n        stdio: \"pipe\",\n      });\n    });\n\n    await when(\"Bob responds to the request\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Confirmed\" },\n      });\n    });\n\n    await thenAssert(\"the completed request envelope still has thread_id and attachments\", async () => {\n      const completed = readRepoJSON<"+"any>(ctx.bobRepo, `requests/completed/${requestId}.json`);\n      expect(completed.thread_id).toBe(threadId);\n      expect(completed.attachments).toHaveLength(1);\n      expect(completed.attachments[0].filename).toBe(\"crash.log\");\n    });\n  });\n\n  // =========================================================================\n  // Status Consistency (US-015)\n  // =========================================================================\n\n  it(\"sets envelope status to completed when moving request to completed directory\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-160000-alice-us15\";\n\n    await given(\"a pending request from Alice exists, addressed to Bob\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob responds to the request\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Looks good\" },\n      });\n    });\n\n    await thenAssert(\"the completed request envelope has status 'completed', not 'pending'\", async () => {\n      const completed = readRepoJSON<"+"any>(ctx.bobRepo, `requests/completed/${requestId}.json`);\n      expect(completed.status).toBe(\"completed\");\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"rejects response when request is already completed\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a request has already been responded to and is in completed\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      // Move to completed manually\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && git mv requests/pending/${requestId}.json requests/completed/ && git commit -m \"already done\" && git push`,\n        { stdio: \"pipe\" },\n      );\n      // Write a response file too\n      writeFileSync(\n        join(ctx.aliceRepo, \"responses\", `${requestId}.json`),\n        JSON.stringify({ request_id: requestId, response_bundle: { answer: \"done\" } }),\n      );\n      execSync(`cd \"${ctx.aliceRepo}\" && git add -A && git commit -m \"response\" && git push`, {\n        stdio: \"pipe\",\n      });\n    });\n\n    await when(\"Bob tries to respond again\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_respond\", {\n          request_id: requestId,\n          response_bundle: { answer: \"duplicate\" },\n        }),\n      ).rejects.toThrow(/already completed/i);\n    });\n\n    await thenAssert(\"no new response file is written\", async () => {\n      // The existing response should be unchanged\n      const response = readRepoJSON<"+"any>(ctx.bobRepo, `responses/${requestId}.json`);\n      expect(response.response_bundle.answer).toBe(\"done\");\n    });\n  });\n\n  it(\"rejects response when current user is not the designated recipient\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-bob-c3d4\";\n\n    await given(\"a request from Bob is addressed to Alice (not Bob)\", async () => {\n      seedPendingRequest(ctx.bobRepo, requestId, \"alice\", \"bob\");\n      gitPull(ctx.aliceRepo);\n    });\n\n    await when(\"Bob tries to respond to his own request (he is the sender, not recipient)\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_respond\", {\n          request_id: requestId,\n          response_bundle: { answer: \"I'll answer my own question\" },\n        }),\n      ).rejects.toThrow(/not the recipient/i);\n    });\n\n    await thenAssert(\"no response is written and request stays in pending\", async () => {\n      const pending = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(pending).toContain(`${requestId}.json`);\n      expect(fileExists(ctx.bobRepo, `responses/${requestId}.json`)).toBe(false);\n    });\n  });\n\n  it(\"rejects response when request ID does not exist\", async () => {\n    ctx = createTestRepos();\n\n    await when(\"Bob tries to respond to a non-existent request\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_respond\", {\n          request_id: \"req-nonexistent-0000\",\n          response_bundle: { answer: \"Ghost response\" },\n        }),\n      ).rejects.toThrow(/not found/i);\n    });\n  });\n\n  it(\"rejects response missing required field: response_bundle\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n    });\n\n    await when(\"Bob submits a response without a response_bundle\", async () => {\n      gitPull(ctx.bobRepo);\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n\n      await expect(\n        bobServer.callTool(\"garp_respond\", {\n          request_id: requestId,\n          // response_bundle omitted\n        }),\n      ).rejects.toThrow(/missing required field.*response_bundle/i);\n    });\n  });\n\n  it(\"retries push after rebase when remote has new commits\", async () => {\n    ctx = createTestRepos();\n    const requestId = \"req-20260221-143022-alice-a1b2\";\n\n    await given(\"a pending request exists and Alice pushes while Bob is responding\", async () => {\n      seedPendingRequest(ctx.aliceRepo, requestId, \"bob\", \"alice\");\n      gitPull(ctx.bobRepo);\n\n      // Alice pushes an unrelated change\n      execSync(\n        `cd \"${ctx.aliceRepo}\" && echo \"note\" > notes.txt && git add notes.txt && git commit -m \"unrelated\" && git push`,\n        { stdio: \"pipe\" },\n      );\n    });\n\n    await when(\"Bob responds (his local is behind the remote)\", async () => {\n      const bobServer = createGarpServer({ repoPath: ctx.bobRepo, userId: \"bob\" });\n      const result = await bobServer.callTool(\"garp_respond\", {\n        request_id: requestId,\n        response_bundle: { answer: \"Rebase retry test\" },\n      });\n\n      expect((result as any).status).toBe(\"completed\");\n    });\n\n    await thenAssert(\"the response reaches the remote\", async () => {\n      gitPull(ctx.aliceRepo);\n      expect(fileExists(ctx.aliceRepo, `responses/${requestId}.json`)).toBe(true);\n    });\n  });\n});\n"},"tests/acceptance/garp-request.test.ts":{"tests":[{"id":"30","name":"garp_request: submit a GARP request submits a sanity-check request with valid envelope and pushes to remote"},{"id":"31","name":"garp_request: submit a GARP request generates a request ID matching the required format"},{"id":"32","name":"garp_request: submit a GARP request includes sender identity from GARP_USER, not from tool input"},{"id":"33","name":"garp_request: submit a GARP request includes optional deadline field when provided"},{"id":"34","name":"garp_request: submit a GARP request accepts any context_bundle shape without server validation"},{"id":"35","name":"garp_request: submit a GARP request rejects request to a recipient not in team config"},{"id":"36","name":"garp_request: submit a GARP request rejects request when request_type has no matching skill directory"},{"id":"37","name":"garp_request: submit a GARP request rejects request missing required field: recipient"},{"id":"38","name":"garp_request: submit a GARP request rejects request missing required field: request_type"},{"id":"39","name":"garp_request: submit a GARP request rejects request missing required field: context_bundle"},{"id":"40","name":"garp_request: submit a GARP request preserves explicit thread_id in envelope and return value when provided"},{"id":"41","name":"garp_request: submit a GARP request submits a request with file attachments written to disk and metadata in envelope"},{"id":"42","name":"garp_request: submit a GARP request auto-assigns thread_id = request_id when thread_id not provided"},{"id":"43","name":"garp_request: submit a GARP request omits attachments from envelope when not provided"},{"id":"44","name":"garp_request: submit a GARP request retries push after rebase when remote has new commits"}],"source":"/**\n * Acceptance Tests -- garp_request (Submit a GARP Request)\n *\n * Traces to: US-002\n *\n * Tests exercise the garp_request driving port (tool handler) against\n * real local git repos. Scenarios verify:\n *   - Successful request submission with valid envelope\n *   - Request ID format and uniqueness\n *   - Envelope validation (missing fields)\n *   - Recipient validation against team config\n *   - Skill directory existence validation\n *   - Git commit message format\n *   - Git push with rebase retry on conflict\n *   - Thread ID passthrough (US-002a)\n *   - File attachments with atomic commit (US-002a)\n *   - Backward compatibility without thread/attachments (US-002a)\n *\n * Error/edge scenarios: 6 of 14 total (43%)\n */\n\nimport { describe, it, expect, afterEach } from \"vitest\";\nimport {\n  createTestRepos,\n  listDir,\n  readRepoJSON,\n  fileExists,\n  lastCommitMessage,\n  gitPull,\n  type TestRepoContext,\n} from \"./helpers/setup-test-repos\";\nimport { given, when, thenAssert } from \"./helpers/gwt\";\nimport { execSync } from \"node:child_process\";\nimport { createGarpServer } from \"../../src/server.ts\";\n\ndescribe(\"garp_request: submit a GARP request\", () => {\n  let ctx: TestRepoContext;\n\n  afterEach(() => {\n    ctx?.cleanup();\n  });\n\n  // =========================================================================\n  // Happy Path\n  // =========================================================================\n\n  it(\"submits a sanity-check request with valid envelope and pushes to remote\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    let requestId: string;\n\n    await given(\"Alice has a configured server and Bob is a team member\", () => {\n      // Server created above; config.json has alice + bob\n    });\n\n    await when(\"Alice submits a sanity-check request to Bob\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: {\n          customer: \"Acme Corp\",\n          product: \"Platform v3.2\",\n          issue_summary: \"Memory leak in auth refresh flow\",\n          involved_files: \"src/auth/refresh.ts:L45-90\",\n          investigation_so_far: \"Tokens held by closure, preventing GC\",\n          question: \"Does this match the session service pattern?\",\n        },\n      })) as { request_id: string };\n      requestId = result.request_id;\n    });\n\n    await thenAssert(\"a request file is created in pending with correct envelope\", async () => {\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(1);\n      expect(pending[0]).toBe(`${requestId}.json`);\n\n      const envelope = readRepoJSON(ctx.aliceRepo, `requests/pending/${requestId}.json`);\n      expect(envelope).toMatchObject({\n        request_id: requestId,\n        request_type: \"sanity-check\",\n        status: \"pending\",\n        sender: { user_id: \"alice\", display_name: \"Alice\" },\n        recipient: { user_id: \"bob\", display_name: \"Bob\" },\n        context_bundle: {\n          customer: \"Acme Corp\",\n          question: \"Does this match the session service pattern?\",\n        },\n      });\n      expect((envelope as { created_at: string }).created_at).toMatch(/^\\d{4}-\\d{2}-\\d{2}T/); // ISO 8601\n    });\n\n    await thenAssert(\"the file is committed with a structured message and pushed\", async () => {\n      const msg = lastCommitMessage(ctx.aliceRepo);\n      expect(msg).toMatch(/\\[garp\\] new request:.*sanity-check.*-> bob/);\n\n      // Verify it reached the remote (Bob can pull it)\n      gitPull(ctx.bobRepo);\n      const bobPending = listDir(ctx.bobRepo, \"requests/pending\");\n      expect(bobPending).toHaveLength(1);\n    });\n  });\n\n  it(\"generates a request ID matching the required format\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Format test\" },\n      })) as { request_id: string };\n\n      // Format: req-{YYYYMMDD}-{HHmmss}-{user_id}-{random4hex}\n      expect(result.request_id).toMatch(/^req-\\d{8}-\\d{6}-alice-[0-9a-f]{4}$/);\n    });\n  });\n\n  it(\"includes sender identity from GARP_USER, not from tool input\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request (sender resolved from GARP_USER)\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Identity test\" },\n      })) as { request_id: string };\n\n      const envelope = readRepoJSON<"+"{ sender: { user_id: string; display_name: string } }>(\n        ctx.aliceRepo,\n        `requests/pending/${result.request_id}.json`,\n      );\n      expect(envelope.sender.user_id).toBe(\"alice\");\n      expect(envelope.sender.display_name).toBe(\"Alice\");\n    });\n  });\n\n  it(\"includes optional deadline field when provided\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request with a deadline\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: { question: \"Deadline test\" },\n        deadline: \"2026-02-21T18:00:00Z\",\n      })) as { request_id: string };\n\n      const envelope = readRepoJSON<"+"{ deadline: string }>(\n        ctx.aliceRepo,\n        `requests/pending/${result.request_id}.json`,\n      );\n      expect(envelope.deadline).toBe(\"2026-02-21T18:00:00Z\");\n    });\n  });\n\n  it(\"accepts any context_bundle shape without server validation\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request with an unusual context bundle\", async () => {\n      const result = (await server.callTool(\"garp_request\", {\n        request_type: \"sanity-check\",\n        recipient: \"bob\",\n        context_bundle: {\n          custom_field: \"whatever the agent wants\",\n          nested: { deeply: { here: true } },\n          array_data: [1, 2, 3],\n        },\n      })) as { request_id: string };\n\n      const envelope = readRepoJSON<"+"{ context_bundle: Record<"+"string, unknown> }>(\n        ctx.aliceRepo,\n        `requests/pending/${result.request_id}.json`,\n      );\n      expect(envelope.context_bundle.custom_field).toBe(\"whatever the agent wants\");\n      expect((envelope.context_bundle.nested as { deeply: { here: boolean } }).deeply.here).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // Error Paths\n  // =========================================================================\n\n  it(\"rejects request to a recipient not in team config\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice tries to send a request to unknown recipient 'charlie'\", async () => {\n      await expect(\n        server.callTool(\"garp_request\", {\n          request_type: \"sanity-check\",\n          recipient: \"charlie\",\n          context_bundle: { question: \"Unknown recipient test\" },\n        }),\n      ).rejects.toThrow(/charlie.*not found in team config/i);\n    });\n\n    await thenAssert(\"no file is created and no commit is made\", async () => {\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n    });\n  });\n\n  it(\"rejects request when request_type has no matching skill directory\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request with type 'code-review' (no skill file)\", async () => {\n      await expect(\n        server.callTool(\"garp_request\", {\n          request_type: \"code-review\",\n          recipient: \"bob\",\n          context_bundle: { question: \"Missing skill test\" },\n        }),\n      ).rejects.toThrow(/no skill found.*code-review/i);\n    });\n\n    await thenAssert(\"no file is created\", async () => {\n      const pending = listDir(ctx.aliceRepo, \"requests/pending\");\n      expect(pending).toHaveLength(0);\n    });\n  });\n\n  it(\"rejects request missing required field: recipient\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    await when(\"Alice submits a request without a recipient\", async () => {\n      await expect(\n        server.callTool(\"garp_request\", {\n          request_type: \"sanity-check\",\n          context_bundle: { question: \"Missing field test\" },\n          // recipient omitted\n        }),\n      ).rejects.toThrow(/missing required field.*recipient/i);\n    });\n  });\n\n  it(\"rejects request missing required field: request_type\", async () => {\n    ctx = createTestRepos();\n    const server = createGarpServer({ repoPath: ctx.aliceRepo, userId: \"alice\" });\n\n    a
