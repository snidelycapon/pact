journey:
  name: receiver
  epic: coordination-mvp
  version: 1.0.0
  created: 2026-02-21
  status: draft

  summary: >
    A colleague receives a sanity-check request in their GARP inbox,
    investigates with agent assistance using the pre-loaded context, composes
    a structured response, and pushes it back.

  actors:
    - id: alex
      role: Colleague / request receiver
      agent_platform: Craft Agents
    - id: cory
      role: Request sender (off-screen)
      agent_platform: Craft Agents

  emotional_arc:
    alex:
      start: idle_or_routine
      awareness: "cory needs eyes on something"
      orientation: "I know exactly what to look at"
      investigation: focused_work
      composition: confident_in_answer
      end: done_task_complete

  preconditions:
    - Alex has a working MCP server configured for the GARP repo
    - Cory has submitted a sanity-check request addressed to Alex
    - The sanity-check SKILL.md exists in the repo
    - Alex has access to the repositories referenced in the context bundle

  steps:
    - id: check-inbox
      actor: alex
      action: Start session or check GARP inbox
      tool: garp_inbox
      git_operations:
        - git pull
      emotion: routine
      description: >
        Alex asks their agent to check the GARP inbox.
        The agent pulls latest from the repo and scans pending/
        for requests addressed to Alex.

    - id: view-inbox-listing
      actor: alex
      action: Review inbox listing
      consumes:
        - artifact: inbox-listing
      emotion: aware
      description: >
        Alex sees a list of pending requests with summaries:
        request ID, type, sender, timestamp, brief summary.
        Alex decides which to handle now.

    - id: open-request
      actor: alex
      action: Opens a specific request from the inbox
      consumes:
        - artifact: request-file
          file: requests/pending/req-{id}.json
        - artifact: skill-file
          file: skills/sanity-check/SKILL.md
      skill_auto_load: true
      emotion: oriented
      key_moment: true
      description: >
        Agent loads the full request JSON and auto-loads the
        SKILL.md based on request_type. Alex sees the complete
        context bundle: customer, files, findings, question.
        Zero cold-start — the agent already has full context.

    - id: investigate
      actor: alex
      action: Investigate the question with agent assistance
      tool: Normal agent session with pre-loaded context
      emotion: focused
      duration: variable (minutes to hours)
      description: >
        Alex works with their agent to investigate the specific
        question. The agent reads the referenced files, compares
        patterns, and assists with analysis. This is a normal
        agent conversation, not a special mode. The SKILL.md
        provides guidance on what kind of answer is expected.

    - id: compose-response
      actor: agent + alex
      action: Agent composes structured response per SKILL.md
      produces:
        - artifact: response-draft
      description: >
        When Alex is satisfied with the investigation, the agent
        composes a response using the SKILL.md response structure:
        answer, evidence, concerns, recommendation.

    - id: review-response
      actor: alex
      action: Review response in Plan submission format
      consumes:
        - artifact: response-draft
      plan_submission: true
      emotion: confident
      description: >
        Alex sees the composed response in Plan submission UI.
        Can edit any field, approve, or cancel. Nothing leaves
        the machine without explicit approval.

    - id: submit-response
      actor: alex
      action: Approve and push the response
      tool: garp_respond
      consumes:
        - artifact: response-draft (approved)
        - artifact: request-file
      produces:
        - artifact: response-file
          file: responses/req-{id}.json
      git_operations:
        - write response to responses/req-{id}.json
        - git mv requests/pending/req-{id}.json requests/completed/
        - git add + commit + push
      emotion: done
      description: >
        Response is written, request is moved to completed,
        everything is committed and pushed. The task is complete.

    - id: continue-work
      actor: alex
      action: Move on to other work or check for more requests
      emotion: complete
      description: >
        Alex can check for more inbox items or move on entirely.

  postconditions:
    - Response file exists at responses/req-{id}.json
    - Request file moved to requests/completed/
    - Git log shows the complete lifecycle (pending -> completed)
    - Cory can now see the response via garp_status

  shared_artifacts:
    - id: request-file
      type: request_json
      file: requests/pending/req-{id}.json
      source: sender journey (Cory)
      consumed_by: [open-request, submit-response]

    - id: skill-file
      type: skill_md
      file: skills/sanity-check/SKILL.md
      source: repo (pre-existing, synced via git pull)
      consumed_by: [open-request, investigate, compose-response]

    - id: response-file
      type: response_json
      file: responses/req-{id}.json
      source: step:submit-response
      consumed_by: sender journey (Cory checks via garp_status)

  key_design_decisions:
    - name: zero_cold_start
      description: >
        The receiver's agent starts with full context from the request.
        No copy-paste, no re-explanation, no manual file loading.
        This is the primary value proposition.

    - name: skill_auto_load
      description: >
        When a request is opened, the SKILL.md matching the request_type
        auto-loads. The agent knows how to handle this type of request
        without the user specifying.

    - name: normal_investigation_mode
      description: >
        The investigation phase is a normal agent conversation. The
        receiver is not in a constrained "coordination response" mode.
        The skill provides guidance, not enforcement.

    - name: plan_submission_for_response
      description: >
        Same as sender side. The response is composed by the agent,
        presented for human review, and only pushed on approval.
        HITL is mandatory, not optional.

  friction_points:
    - step: check-inbox
      severity: medium
      description: >
        Polling model. Alex must actively check inbox.
        No push notification at Tier 1.
      mitigation_mvp: Agent checks inbox at session start as routine
      mitigation_tier2: Brain service sends Slack/email notification

    - step: investigate
      severity: low
      description: >
        Context bundle references files in repos Alex may not have cloned.
        The protocol delivers context pointers, not the files themselves.
      mitigation: >
        Alex needs access to relevant repos independently.
        The skill can note required repo access.

  beads_parallels:
    note: >
      User referenced github.com/steveyegge/beads as inspiration for
      inbox/workflow patterns and multi-agent handoffs. The receiver
      journey parallels Beads' context handoff model. Key differences:
      this protocol is distributed (git transport), HITL is mandatory,
      and the skill contract defines the interaction type.
