journey:
  name: sender
  epic: coordination-mvp
  version: 1.0.0
  created: 2026-02-21
  status: draft

  summary: >
    A user investigating a bug with their agent composes a structured
    sanity-check request, reviews it, sends it to a colleague via the
    PACT repo, and later receives a structured response.

  actors:
    - id: cory
      role: Tech support engineer / request sender
      agent_platform: Craft Agents
    - id: alex
      role: Colleague / request recipient (off-screen in this journey)
      agent_platform: Craft Agents

  emotional_arc:
    cory:
      start: focused_then_uncertain
      transition: decides_to_ask_for_help
      middle: confident_after_review
      wait: freed_from_blocking
      end: validated_by_response

  preconditions:
    - Cory has a working MCP server configured for the PACT repo
    - Alex is a member of the PACT repo
    - The sanity-check PACT.md exists in the repo
    - Cory is in an active agent session investigating a bug

  steps:
    - id: investigating
      actor: cory
      action: Investigating a bug with agent assistance
      tool: Craft Agents session (normal investigation)
      emotion: focused_then_uncertain
      description: >
        Cory is reading files, analyzing code, working with their agent.
        They find something but are not sure if it matches a known pattern.

    - id: decide-to-ask
      actor: cory
      action: Decides to ask Alex for a sanity check
      trigger: uncertainty_about_finding
      invocation_methods:
        - direct: "Use the sanity-check pact to ask Alex about this"
        - inferred: "Can you ask Alex if this matches what she saw last month?"
      emotion: need_for_validation

    - id: load-pact
      actor: agent
      action: Agent loads PACT.md for the sanity-check request type
      tool: filesystem (reads from repo pacts/ directory)
      consumes:
        - artifact: pact-file
          file: pacts/sanity-check/PACT.md
      automatic: true
      description: >
        The pact file tells the agent what fields to gather,
        how to structure the request, and what a good request looks like.

    - id: gather-context
      actor: agent + cory
      action: Agent assembles context bundle from session and user input
      produces:
        - artifact: context-bundle-draft
      description: >
        Agent extracts from current session: customer, product, files examined,
        findings so far. May ask Cory to clarify the specific question.
      interaction: >
        Agent may ask: "What specific question do you want Alex to answer?"
        or "Should I include the Zendesk ticket reference?"

    - id: compose-request
      actor: agent
      action: Agent composes full request and presents for review
      produces:
        - artifact: request-draft
      plan_submission: true
      description: >
        The composed request appears in Plan submission UI.
        Cory sees: recipient, type, question, context bundle, priority.
        Can edit any field, approve, or cancel.
      emotion: confident_after_review

    - id: submit-request
      actor: cory
      action: Approves the request; agent calls pact_request
      tool: pact_request
      consumes:
        - artifact: request-draft
      produces:
        - artifact: request-file
          file: requests/pending/req-{id}.json
      git_operations:
        - git add requests/pending/req-{id}.json
        - git commit -m "[pact] new request: req-{id} (sanity-check) -> alex"
        - git push
      emotion: relieved
      description: >
        Request is written to repo, committed, and pushed.
        From this point it exists independently of the conversation.

    - id: continue-work
      actor: cory
      action: Returns to other work; session may end
      emotion: freed
      duration: variable (minutes to days)
      description: >
        The request lifecycle is fully decoupled from the conversation.
        Cory may close this session, start new work, or check back later.

    - id: check-status
      actor: cory
      action: Checks on the request status (any session)
      tool: pact_status
      consumes:
        - artifact: request-file
        - artifact: response-file (if exists)
          file: responses/req-{id}.json
      git_operations:
        - git pull
      emotion: curious_then_validated
      description: >
        Can happen in any session, at any time. Agent pulls latest
        from repo and reads the request status and any response.

    - id: review-response
      actor: cory
      action: Reviews the response presented Plan-style
      consumes:
        - artifact: response-file
      plan_submission: false
      plan_display: true
      emotion: validated
      description: >
        The response is presented in the same Plan UI format.
        Cory reads Alex's answer, evidence, and recommendation.

    - id: act-on-response
      actor: cory
      action: Takes action based on the response
      emotion: empowered
      description: >
        Cory applies the fix, escalates the bug, files a ticket,
        or whatever the response suggests. This step is outside
        the PACT.

  postconditions:
    - Request file exists in requests/completed/ (moved by Alex's respond step)
    - Response file exists in responses/req-{id}.json
    - Full audit trail in git log
    - Cory has actionable information from Alex

  shared_artifacts:
    - id: pact-file
      type: pact_md
      file: pacts/sanity-check/PACT.md
      source: repo (pre-existing)
      consumed_by: [load-pact]
    - id: request-file
      type: request_json
      file: requests/pending/req-{id}.json
      source: step:submit-request
      consumed_by: [check-status]
      fields:
        - request_id
        - request_type
        - sender (user_id, display_name)
        - recipient (user_id, display_name)
        - status
        - created_at
        - deadline (optional)
        - context_bundle (flexible, defined by pact)
        - expected_response
    - id: response-file
      type: response_json
      file: responses/req-{id}.json
      source: receiver journey (Alex)
      consumed_by: [check-status, review-response]

  key_design_decisions:
    - name: plan_submission_pattern
      description: >
        Request composition uses Plan submission for human review.
        Response display uses Plan-style presentation.
        Nothing leaves the machine without explicit human approval.

    - name: single_pact_file
      description: >
        Both sender and receiver load the same PACT.md.
        The pact defines the contract: what fields to gather
        (sender) and how to interpret/respond (receiver).

    - name: session_decoupling
      description: >
        Requests exist as files in git. They are not tied to any
        conversation or session. Any session can check status or
        respond at any time.

    - name: agent_context_assembly
      description: >
        The agent assembles the context bundle from session state
        and PACT.md field requirements. This replaces the manual
        markdown composition that is the current pain point.
