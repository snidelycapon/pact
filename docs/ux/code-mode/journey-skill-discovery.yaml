journey:
  name: skill-discovery
  epic: code-mode
  version: 1.0.0
  created: 2026-02-22
  status: draft

  summary: >
    Agents discover available request types, understand their contracts,
    and compose well-formed payloads without upfront knowledge of all
    skills or reading full SKILL.md files on every interaction.

  actors:
    - id: cory
      role: Developer composing a request, does not know which skill to use
      agent_platform: Claude Code / Craft Agents
    - id: maria-santos
      role: New team member, has never seen the skill catalog
      agent_platform: Claude Code / Craft Agents
    - id: dan
      role: Receiver checking inbox, needs to understand response expectations
      agent_platform: Claude Code / Craft Agents

  emotional_arc:
    sender:
      start: intent_but_uncertain
      transition: discovers_available_skills
      middle: oriented_after_catalog
      late: confident_with_typed_fields
      end: relieved_well_formed_request_sent
    receiver:
      start: inbox_check
      transition: sees_skill_summary_inline
      middle: oriented_without_extra_reads
      end: responds_with_clear_expectations

  preconditions:
    - GARP MCP server configured and running
    - At least one skill exists in skills/ directory
    - Team members registered in config.json
    - garp_skills tool registered in MCP server

  flows:
    - id: sender-discovers-all
      name: Sender lists all available skills
      description: >
        Agent does not know what request types exist. Calls garp_skills
        with no query to get the full catalog, then selects the right
        type and proceeds to compose the request.
      steps:
        - id: intent
          actor: cory
          action: Expresses intent to request help
          trigger: natural_language ("Can someone review my auth changes?")
          emotion: intent_but_uncertain

        - id: query-skills
          actor: agent
          action: Calls garp_skills to list available request types
          tool: garp_skills
          params: {}
          produces:
            - artifact: skill-catalog
          description: >
            Returns all skills with name, description, when_to_use, and
            field names for both context_bundle and response_bundle.

        - id: select-skill
          actor: agent
          action: Matches user intent to the right skill type
          consumes:
            - artifact: skill-catalog
          produces:
            - artifact: selected-skill-name
          emotion: oriented
          description: >
            Agent compares user's intent ("review my auth changes") against
            skill descriptions and selects "code-review" as the best match.

        - id: load-contract
          actor: agent
          action: Loads full skill contract for composition guidance
          tool: filesystem
          consumes:
            - artifact: selected-skill-name
          produces:
            - artifact: skill-contract
          description: >
            Reads SKILL.md or schema.json for the selected skill.
            Gets full field definitions, examples, and guidance.

        - id: assemble-context
          actor: agent + cory
          action: Assembles context bundle using skill contract fields
          consumes:
            - artifact: skill-contract
          produces:
            - artifact: context-bundle-draft
          emotion: confident
          description: >
            Agent knows exactly what fields are required. Gathers from
            session context and prompts user for anything missing.

        - id: compose-and-submit
          actor: cory
          action: Reviews composed request, approves, agent submits
          tool: garp_request
          consumes:
            - artifact: context-bundle-draft
          produces:
            - artifact: request-file
              file: requests/pending/req-{id}.json
          plan_submission: true
          emotion: relieved

    - id: sender-searches-by-intent
      name: Sender searches skills by keyword
      description: >
        New team member does not know the skill catalog. Agent searches
        garp_skills with a query derived from user intent.
      steps:
        - id: intent
          actor: maria-santos
          action: Describes need in natural language
          trigger: natural_language ("I need someone to look over my code changes")
          emotion: uncertain

        - id: search-skills
          actor: agent
          action: Calls garp_skills with search query
          tool: garp_skills
          params:
            query: "review code changes"
          produces:
            - artifact: filtered-skill-catalog
          description: >
            Returns skills matching the query, filtered by keyword match
            against name, description, and when_to_use.

        - id: select-and-compose
          actor: agent + maria-santos
          action: Selects matching skill and composes request
          consumes:
            - artifact: filtered-skill-catalog
          description: >
            Same as sender-discovers-all steps 3-6, starting from
            filtered results instead of full catalog.
          emotion: oriented_then_confident

    - id: receiver-enriched-inbox
      name: Receiver sees skill summary in inbox
      description: >
        When checking inbox, receiver sees what each request expects
        without reading the full SKILL.md first.
      steps:
        - id: check-inbox
          actor: dan
          action: Checks inbox at session start
          tool: garp_inbox
          produces:
            - artifact: enriched-inbox
          description: >
            Inbox entries now include skill_description and
            response_fields alongside the existing skill_path.

        - id: orient-from-summary
          actor: dan
          action: Reads skill summary inline in inbox entry
          consumes:
            - artifact: enriched-inbox
          emotion: oriented
          description: >
            Dan sees "Response expects: answer, evidence, recommendation"
            directly in the inbox entry. Knows what is expected without
            a separate file read.

        - id: pick-and-respond
          actor: dan
          action: Selects a request and begins responding
          consumes:
            - artifact: enriched-inbox
          description: >
            Proceeds to normal receiver journey (load full skill,
            investigate, compose response, submit).

    - id: schema-guided-composition
      name: Agent uses schema.json for typed composition
      description: >
        When schema.json exists alongside SKILL.md, the agent reads
        the JSON Schema for precise field requirements instead of
        interpreting markdown tables.
      steps:
        - id: load-schema
          actor: agent
          action: Reads schema.json for the selected skill
          tool: filesystem
          consumes:
            - artifact: selected-skill-name
          produces:
            - artifact: typed-schema
              file: skills/{type}/schema.json
          description: >
            JSON Schema with required/optional field definitions,
            types, and descriptions.

        - id: validate-bundle
          actor: agent
          action: Validates assembled context bundle against schema
          consumes:
            - artifact: typed-schema
            - artifact: context-bundle-draft
          produces:
            - artifact: validation-result
          description: >
            Checks that all required fields are present and types match.
            Validation is informational (warn, not reject).

        - id: submit-validated
          actor: cory
          action: Submits request with validated payload
          tool: garp_request
          consumes:
            - artifact: context-bundle-draft
          produces:
            - artifact: request-file
          emotion: confident
          description: >
            If validation passes, submit. If validation warns,
            the warning is included in the garp_request response
            so the sender is aware of missing fields.

  postconditions:
    - Agent discovered the right skill without startup loading of all SKILL.md files
    - Context bundle matches the skill contract (required fields present)
    - Receiver can orient from inbox entry without a separate file read
    - schema.json provides typed field information when available
    - Existing workflows (no garp_skills, no schema.json) continue to work unchanged

  shared_artifacts:
    - id: skill-catalog
      type: garp_skills_result
      source: step:query-skills
      consumed_by: [select-skill]
      fields:
        - name (string)
        - description (string)
        - when_to_use (string)
        - context_fields (string[])
        - response_fields (string[])
        - skill_path (string)

    - id: typed-schema
      type: json_schema
      file: skills/{type}/schema.json
      source: skill author (pre-existing)
      consumed_by: [validate-bundle, garp_skills]
      fields:
        - skill_name (string)
        - skill_version (string)
        - context_bundle (JSON Schema object)
        - response_bundle (JSON Schema object)

    - id: enriched-inbox-entry
      type: inbox_entry
      source: step:check-inbox (garp_inbox response)
      consumed_by: [orient-from-summary]
      fields:
        - request_id (string)
        - request_type (string)
        - sender (string)
        - summary (string)
        - skill_path (string)
        - skill_description (string, NEW)
        - response_fields (string[], NEW)

  key_design_decisions:
    - name: additive_not_replacing
      description: >
        garp_skills is a new tool alongside existing 7. No existing
        tools are modified except garp_inbox (enriched entries).
        schema.json is an optional convention. Nothing is removed.

    - name: progressive_discovery
      description: >
        Instead of loading all SKILL.md files at session startup,
        agents query garp_skills at composition time. Baseline
        context cost drops from O(skills) to O(1).

    - name: warn_not_reject
      description: >
        Schema validation produces warnings, not rejections. The
        protocol remains a "dumb router" -- it annotates, not blocks.
        This preserves the open-ended flexibility the user values.

    - name: schema_is_optional
      description: >
        schema.json is an optional companion to SKILL.md. Skills work
        without it. When present, it provides machine-readable type
        information. When absent, the agent reads SKILL.md as before.

    - name: phase_a_is_foundation
      description: >
        garp_skills becomes the implementation behind Phase B's
        garp_discover. schema.json becomes the input for Phase B's
        SDK type generation. Phase A is not throwaway.
