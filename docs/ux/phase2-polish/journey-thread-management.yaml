journey:
  name: thread-management
  epic: phase2-polish
  version: 1.0.0
  created: 2026-02-21
  status: draft

  summary: >
    A multi-round collaboration using thread_id to link requests into
    a coherent conversation. Covers auto-assignment of thread_id on
    round 1, viewing thread history, and thread-aware inbox grouping.

  actors:
    - id: cory
      role: Sender / thread initiator
      agent_platform: Claude Code
    - id: dan
      role: Recipient / collaborator
      agent_platform: Claude Code

  emotional_arc:
    cory:
      start: proposing
      transition: needs_thread_context
      middle: oriented_by_thread_view
      end: iterating_confidently
    dan:
      start: checking_inbox
      transition: sees_grouped_thread
      middle: oriented_by_context
      end: responds_with_full_history

  preconditions:
    - Both users have configured MCP servers for the shared PACT repo
    - The design-pact PACT.md exists in the repo
    - At least one round of a multi-round conversation has occurred

  steps:
    - id: send-round-1
      actor: cory
      action: Sends first request in a new conversation
      tool: pact_request
      produces:
        - artifact: request-round-1
          file: requests/pending/req-{id}.json
      description: >
        No thread_id provided. This is the opening move.

    - id: auto-thread-id
      actor: system
      action: pact_request auto-assigns thread_id = request_id
      produces:
        - artifact: thread-anchor
          field: thread_id (set to request_id value)
      automatic: true
      description: >
        When thread_id is absent, the server sets thread_id = request_id.
        This request becomes the thread anchor.

    - id: respond-round-1
      actor: dan
      action: Dan responds to round 1
      tool: pact_respond
      produces:
        - artifact: response-round-1
          file: responses/req-{id}.json

    - id: send-round-2
      actor: cory
      action: Sends follow-up request with thread_id
      tool: pact_request
      consumes:
        - artifact: thread-anchor
      produces:
        - artifact: request-round-2
          file: requests/pending/req-{id2}.json
      description: >
        Cory provides thread_id from round 1. The new request links
        into the existing thread.

    - id: view-thread
      actor: cory
      action: Requests thread history
      tool: pact_thread
      consumes:
        - artifact: thread-anchor
      produces:
        - artifact: thread-view
      emotion: oriented
      description: >
        Agent calls pact_thread with the thread_id. Returns chronological
        list of all requests and responses in the thread.

    - id: threaded-inbox
      actor: dan
      action: Checks inbox, sees grouped thread
      tool: pact_inbox
      emotion: oriented
      description: >
        Inbox groups pending requests by thread_id. Dan sees one entry
        for the thread with round count and latest summary.

  shared_artifacts:
    - id: thread-anchor
      type: thread_id_string
      source: step:auto-thread-id
      consumed_by: [send-round-2, view-thread, threaded-inbox]
      description: >
        The thread_id value that links all requests in a conversation.
        Equal to the request_id of the first request in the thread.

    - id: thread-view
      type: thread_summary
      source: step:view-thread
      fields:
        - thread_id
        - participants (list of user_ids)
        - round_count
        - latest_status
        - entries (chronological list of {request, response?} pairs)
