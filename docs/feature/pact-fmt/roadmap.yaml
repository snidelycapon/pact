roadmap:
  project_id: pact-fmt
  created_at: '2026-02-24T15:07:46Z'
  total_steps: 11
  phases: 4
phases:
- id: '01'
  name: 'Flat-file pact store and inheritance'
  steps:
  - id: 01-01
    name: 'Flat-file pact loader with extended metadata'
    criteria: >-
      Recursive glob of pact-store/**/*.md returns PactMetadata for each valid file.
      Extended fields (scope, defaults, multi_round, attachments, registered_for, has_hooks)
      are parsed from YAML frontmatter and surfaced in catalog entries. Non-.md files
      are ignored. Files with malformed YAML or missing name field are skipped without
      crashing. Empty pact-store directory returns an empty array. Subdirectory nesting
      within pact-store is supported.
  - id: 01-02
    name: 'Single-level pact inheritance resolution'
    criteria: >-
      After flat-file loading (01-01), pacts with extends field are resolved against
      their parent. Merge semantics: child overrides description, scope, registered_for
      wholesale. context_bundle.fields shallow-merge (parent keys + child keys, child
      wins on collision); context_bundle.required replaced by child list. response_bundle
      inherited from parent when child omits it. defaults shallow-merge (child overrides
      parent keys, parent keys not in child are kept). The extends field is consumed
      and absent from output. Both base and variant appear as flat catalog entries.
      Orphan variants (parent not found) are excluded. Deep inheritance (grandchild
      extending a child that itself extends) is rejected: grandchild excluded, base
      and first-level variant still returned.
  - id: 01-03
    name: 'Discover tool integration with flat-file fallback'
    criteria: >-
      pact_discover uses the flat-file loader as primary source when pact-store/ exists.
      When pact-store/ does not exist, discovery falls back to the old pacts/{name}/PACT.md
      directory format and still returns results. PactCatalogEntry output includes the
      extended metadata fields (scope, defaults, multi_round, attachments, registered_for,
      has_hooks) alongside existing name, description, version, context_bundle, and
      response_bundle fields.
- id: '02'
  name: 'Compressed catalog and scope filtering'
  steps:
  - id: 02-01
    name: 'Compressed pipe-delimited catalog format'
    criteria: >-
      When pact_discover is called with format: "compressed", the result contains a
      catalog field with pipe-delimited entries (one per line). Format:
      name|description|scope|context_required_fields→response_required_fields where
      context/response fields are comma-joined required field names. Example:
      ask|Get input that unblocks current work|global|question→answer. Compressed
      entry name and description match the full catalog entry exactly. Inherited
      variants appear as fully resolved compressed entries.
  - id: 02-02
    name: 'Discover tool schema update for format and scope params'
    criteria: >-
      The pact_discover Zod schema in mcp-server.ts accepts optional format parameter
      (enum: "full", "compressed") and optional scope parameter (string). Both parameters
      are optional and backward-compatible: omitting them returns the existing full-format
      unfiltered catalog.
  - id: 02-03
    name: 'Scope filtering and edge cases'
    criteria: >-
      When scope parameter is provided, only pacts matching that scope value are returned.
      When no scope filter is set, all scopes are included. Filtering by a scope with no
      matching pacts returns an empty pacts array (not an error). Invalid or nonexistent
      scope values return empty results (not an error). Compressed format with an empty
      pact-store returns an empty catalog string. Scope filtering works with both full
      and compressed formats.
- id: '03'
  name: 'Group addressing with per-respondent responses'
  steps:
  - id: 03-01
    name: 'Recipients array schema and send handler'
    criteria: >-
      RequestEnvelopeSchema accepts recipients: UserRef[] and optional group_ref: string.
      The old recipient field is kept for backward-compat reading. handlePactRequest
      accepts a recipients string array via pact_do params. The send handler validates
      that all recipient user_ids exist in the team config, the sender is not in the
      recipients array, and the array is non-empty. The written envelope contains
      recipients[] (not singular recipient). mcp-server.ts schema for the send action
      includes recipients and group_ref parameters.
  - id: 03-02
    name: 'Per-respondent response storage and inbox filtering'
    criteria: >-
      Responses are stored as responses/{request_id}/{user_id}.json (directory per
      request, file per respondent). handlePactRespond verifies the caller is in the
      envelope's recipients[] before accepting. Each respond call marks status
      "completed" and moves to requests/completed/ (PACT is a dumb pipe — agents
      decide whether to wait for all responses). Inbox filtering matches requests
      where recipients.some(r => r.user_id === userId). Inbox entries for group
      requests include recipients_count and group_ref fields. A single-recipient
      request sent via recipients array of one works end-to-end with per-respondent
      storage.
  - id: 03-03
    name: 'Status and thread aggregation for per-respondent responses'
    criteria: >-
      handlePactStatus reads the responses/{request_id}/ directory and returns an array
      of all per-respondent responses with each responder identified. handlePactThread
      aggregates per-respondent responses into the thread view. When all recipients have
      responded, status reports completed. Status check with both bob.json and carol.json
      present returns both responder entries.
- id: '04'
  name: 'Error paths and backward compatibility'
  steps:
  - id: 04-01
    name: 'Group validation error paths'
    criteria: >-
      Send with an unknown user_id in recipients fails with an error message identifying
      the unknown user. Send with an empty recipients array fails with a validation error.
      Send with the sender included in recipients fails because sender cannot be a
      recipient. A respond attempt from a user not in the envelope's recipients[] is
      rejected with a not-recipient / not-authorized error. A duplicate response from
      the same recipient to the same request is rejected. In all error cases, no request
      or response files are written.
  - id: 04-02
    name: 'Backward-compatible readers for old formats'
    criteria: >-
      Inbox reads old-format request envelopes with singular recipient field (not
      recipients[]) and still surfaces them to the correct user. Response readers
      check directory first (responses/{id}/ as dir) then fall back to single file
      (responses/{id}.json). Status reads old-format single response files and returns
      the response normally. Thread view aggregates per-respondent responses from the
      directory format. Status check with mixed old single-file and new per-respondent
      directory formats returns results from both.
implementation_scope:
  source_directories:
  - src/
  test_directories:
  - tests/acceptance/
  excluded_patterns:
  - node_modules/**
  - dist/**
validation:
  status: approved
  reviewer: nw-software-crafter-reviewer
  approved_at: '2026-02-24T15:12:00Z'
  review_rounds:
    - date: '2026-02-24T15:10:00Z'
      verdict: NEEDS_REVISION
      notes: >-
        AC clarification needed: inheritance merge semantics, compressed format spec,
        group status semantics, backward compat detection order.
    - date: '2026-02-24T15:12:00Z'
      verdict: APPROVED
      notes: >-
        All blocking issues addressed in revision. Merge semantics explicit,
        compressed format has example, status follows apathy principle (each respond
        completes), detection order documented as directory-first.
