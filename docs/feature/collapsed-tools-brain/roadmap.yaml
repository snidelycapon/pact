roadmap:
  project_id: collapsed-tools-brain
  created_at: '2026-02-22T15:17:46Z'
  total_steps: 9
  phases: 3
phases:
- id: '01'
  name: 'Core Infrastructure'
  steps:
  - id: 01-01
    name: 'Skill Loader'
    criteria: >-
      skill-loader.ts parses YAML frontmatter from SKILL.md files via injected FilePort.
      Returns typed metadata (name, version, description, when_to_use, context_bundle
      with required + fields containing type/description, response_bundle, has_brain).
      Returns undefined for missing or malformed SKILL.md files.
      Unit tests in tests/unit/skill-loader.test.ts pass with >90% mutation score.
      Files: src/skill-loader.ts, tests/unit/skill-loader.test.ts.
  - id: 01-02
    name: 'Action Dispatcher'
    criteria: >-
      action-dispatcher.ts maps action strings to handler functions for all 7 actions
      (send, respond, cancel, amend, check_status, inbox, view_thread).
      Unknown actions produce a descriptive error that lists all valid actions.
      Missing or empty action field produces an error referencing "action".
      Unit tests in tests/unit/action-dispatcher.test.ts pass.
      Files: src/action-dispatcher.ts, tests/unit/action-dispatcher.test.ts.
  - id: 01-03
    name: 'Discovery Handler'
    criteria: >-
      garp-discover.ts uses skill-loader to build a skills catalog and ConfigPort
      to read team members. Optional query parameter filters by keyword across
      name, description, and when_to_use. Returns { skills, team, warning? }.
      Pulls from git before reading skills; falls back to local with warning on failure.
      Skips hidden directories, missing SKILL.md, malformed YAML, and empty frontmatter.
      Walking skeleton acceptance test (garp-discover.test.ts scenario 1) passes:
      catalog contains 3 skills with YAML-parsed metadata and 2 team members.
      Files: src/tools/garp-discover.ts, tests/acceptance/garp-discover.test.ts.
- id: '02'
  name: 'Integration + Surface Registration'
  steps:
  - id: 02-01
    name: 'garp_do Handler'
    criteria: >-
      garp-do.ts extracts the action field from params and delegates to action-dispatcher.
      Passes adapter context (GitPort, FilePort, ConfigPort) through to the dispatched handler.
      Walking skeleton acceptance test (garp-do.test.ts scenario 1) passes:
      Alice sends a sanity-check request to Bob via action "send" and Bob sees it via action "inbox".
      Files: src/tools/garp-do.ts, tests/acceptance/garp-do.test.ts.
  - id: 02-02
    name: 'MCP Registration (Additive)'
    criteria: >-
      garp_discover and garp_do tool registrations added to src/mcp-server.ts
      alongside the existing 8 tools. callTool dispatch cases added to src/server.ts
      for both new tools. All 10 tools are registered simultaneously.
      All existing acceptance and unit tests continue to pass unchanged.
      Files: src/mcp-server.ts, src/server.ts.
  - id: 02-03
    name: 'Enable Milestone 1-3 Tests (garp-discover)'
    criteria: >-
      All garp-discover acceptance tests from milestones 1, 2, and 3 are unskipped and pass.
      Milestone 1: response_bundle schema with required/fields, has_brain true/false,
      context_bundle with all field metadata, git pull fetches new skills.
      Milestone 2: query filtering matches against name/description/when_to_use,
      empty results return empty array with team still present.
      Milestone 3: stale remote falls back to local with warning, missing SKILL.md skipped,
      malformed YAML skipped, hidden directories excluded, empty catalog returns empty array,
      empty frontmatter excluded. Total: 14 scenarios passing.
      Files: tests/acceptance/garp-discover.test.ts, src/tools/garp-discover.ts, src/skill-loader.ts.
  - id: 02-04
    name: 'Enable Milestone 4-5 Tests (garp-do)'
    criteria: >-
      All garp-do acceptance tests from milestones 4 and 5 are unskipped and pass.
      Milestone 4: all 7 action dispatch tests pass (send creates pending request with correct ID,
      inbox returns pending requests, respond completes request, check_status returns status,
      cancel moves to cancelled, amend increments amendment count, view_thread returns history).
      Milestone 5: unknown action "deploy" rejected with error listing valid actions,
      missing action rejected, empty action rejected, handler validation errors pass through
      unchanged (recipient not found, missing required field, no matching skill).
      Total: 13 scenarios passing.
      Files: tests/acceptance/garp-do.test.ts, src/tools/garp-do.ts, src/action-dispatcher.ts.
- id: '03'
  name: 'Migration + Cleanup'
  steps:
  - id: 03-01
    name: 'Handler Import Migration'
    criteria: >-
      garp-request.ts imports getRequiredContextFields equivalent from skill-loader
      instead of skill-parser. garp-inbox.ts imports parseSkillMetadata equivalent
      from skill-loader instead of skill-parser. Behavioral contract is unchanged:
      all existing acceptance tests for garp-request and garp-inbox pass without
      any test modifications. skill-parser.ts has zero remaining importers.
      Files: src/tools/garp-request.ts, src/tools/garp-inbox.ts, src/skill-loader.ts.
  - id: 03-02
    name: 'Surface Removal + Test Migration'
    criteria: >-
      8 old tool registrations removed from src/mcp-server.ts; only garp_discover
      and garp_do remain. Old callTool cases removed from src/server.ts.
      src/skill-parser.ts deleted (291 lines). src/tools/garp-skills.ts deleted (82 lines).
      garp-skills acceptance tests migrated to call garp_discover with equivalent assertions.
      garp-request acceptance tests migrated to call garp_do({ action: "send", ... }).
      garp-inbox acceptance tests migrated to call garp_do({ action: "inbox" }).
      skill-parser unit tests replaced by skill-loader unit tests.
      All tests pass using the collapsed 2-tool surface only.
      Files: src/mcp-server.ts, src/server.ts, src/skill-parser.ts, src/tools/garp-skills.ts,
      tests/acceptance/garp-skills.test.ts, tests/acceptance/garp-request.test.ts,
      tests/acceptance/garp-inbox.test.ts, tests/unit/skill-parser.test.ts.
implementation_scope:
  source_directories:
  - src/
  - src/tools/
  - src/adapters/
  test_directories:
  - tests/unit/
  - tests/acceptance/
  excluded_patterns:
  - node_modules/**
  - dist/**
  - docs/**
validation:
  status: approved
  reviewer: nw-solution-architect-reviewer
  approved_at: '2026-02-22T15:30:00Z'
  review_summary: |
    Roadmap approved. Three-phase strategy (Build → Validate → Remove) is sound.
    Step decomposition is atomic and well-ordered. Acceptance criteria are behavioral
    and measurable. Files to modify are accurate. Implementation can proceed with
    confidence beginning at Phase 1, Step 01-01 (skill-loader).
  key_findings:
    - All 9 steps are independently deliverable and testable
    - Walking skeleton tests already exist and pre-written (28 scenarios, 14-15 skipped)
    - Dependency ordering respects critical gates (Phase 2 validation before Phase 3 deletion)
    - No breaking changes to handler modules; migration is additive then subtractive
    - skill-loader and action-dispatcher are appropriately isolated
  review_location: REVIEW_COLLAPSED_TOOLS_BRAIN_ROADMAP.md
